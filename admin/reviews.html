<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Key2MD Admin — Reviews</title>
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet" />
  <style>
    :root {
      --bg: #0b1220;
      --bg-soft: rgba(255,255,255,0.04);
      --panel: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.12);
      --text: #f4f7fb;
      --muted: #a9b4c6;
      --accent: #7dd3fc;
      --success: #86efac;
      --shadow: 0 16px 40px rgba(0,0,0,0.24);
      --maxw: 1320px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at top left, rgba(125,211,252,0.14), transparent 28%),
        radial-gradient(circle at top right, rgba(147,197,253,0.12), transparent 24%),
        linear-gradient(180deg, #07111f 0%, #0b1220 100%);
      color: var(--text);
      font-family: var(--font);
      min-height: 100%;
    }

    .shell {
      width: min(var(--maxw), calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 64px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      padding: 18px 20px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
      backdrop-filter: blur(14px);
      border-radius: 22px;
      box-shadow: var(--shadow);
    }

    .brand h1 {
      margin: 0 0 6px;
      font-size: clamp(1.4rem, 2vw, 2rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--bg-soft);
      color: var(--muted);
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .controls {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr auto;
      gap: 12px;
      margin-bottom: 18px;
    }

    .control, .button, .select {
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      padding: 14px;
      min-height: 48px;
      outline: none;
      transition: border-color .18s ease, transform .18s ease, background .18s ease;
      font: inherit;
    }

    .control::placeholder { color: #91a0b8; }

    .control:focus, .select:focus {
      border-color: rgba(125,211,252,0.55);
      background: rgba(255,255,255,0.08);
    }

    .button {
      cursor: pointer;
      font-weight: 700;
      letter-spacing: 0.01em;
      background: linear-gradient(180deg, rgba(125,211,252,0.24), rgba(125,211,252,0.14));
    }

    .button:hover {
      transform: translateY(-1px);
      border-color: rgba(125,211,252,0.45);
    }

    .button.secondary {
      background: rgba(255,255,255,0.06);
      font-weight: 600;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .card {
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.075), rgba(255,255,255,0.045));
      border-radius: 18px;
      padding: 16px;
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .card .label {
      color: var(--muted);
      font-size: 0.83rem;
      margin-bottom: 8px;
    }

    .card .value {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .tableWrap {
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.035));
      border-radius: 22px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .status {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .tableScroller {
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1080px;
    }

    th, td {
      text-align: left;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      vertical-align: top;
      font-size: 0.95rem;
    }

    th {
      position: sticky;
      top: 0;
      background: rgba(8,16,30,0.94);
      color: var(--muted);
      text-transform: uppercase;
      font-size: 0.76rem;
      letter-spacing: 0.08em;
      z-index: 1;
    }

    tr.data-row {
      cursor: pointer;
      transition: background .16s ease;
    }

    tr.data-row:hover {
      background: rgba(255,255,255,0.045);
    }

    .muted { color: var(--muted); }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      font-size: 0.8rem;
      white-space: nowrap;
    }

    .badge.free { color: var(--accent); }
    .badge.paid, .badge.premium, .badge.pro { color: var(--success); }

    .truncate {
      max-width: 460px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .detail-row { display: none; }
    .detail-row.open { display: table-row; }

    .detail-panel {
      padding: 18px;
      background: rgba(255,255,255,0.035);
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .detail-box {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      padding: 14px;
      min-height: 160px;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    .detail-box h4 {
      margin: 0 0 12px;
      font-size: 0.95rem;
    }

    .error {
      margin-top: 12px;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid rgba(252,165,165,0.25);
      background: rgba(252,165,165,0.08);
      color: #ffe3e3;
      display: none;
    }

    .empty {
      padding: 36px 18px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 1100px) {
      .controls { grid-template-columns: 1fr 1fr; }
      .summary { grid-template-columns: 1fr 1fr; }
      .detail-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 720px) {
      .shell { width: min(calc(100vw - 20px), var(--maxw)); padding-top: 18px; }
      .topbar { flex-direction: column; align-items: flex-start; }
      .controls { grid-template-columns: 1fr; }
      .summary { grid-template-columns: 1fr; }
      th, td { padding: 12px; }
      .truncate { max-width: 240px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div class="brand">
        <h1>Admin Reviews</h1>
        <p>Private internal view for submissions, student identities, and feedback history.</p>
      </div>
      <div class="pill" id="adminBadge">Checking admin session…</div>
    </div>

    <div class="controls">
      <input id="searchInput" class="control" type="text" placeholder="Search email, name, question, or response" />
      <select id="toolFilter" class="select">
        <option value="">All tools</option>
        <option value="casper">CASPer</option>
        <option value="mmi">MMI</option>
        <option value="gamsat">GAMSAT</option>
      </select>
      <select id="tierFilter" class="select">
        <option value="">All tiers</option>
        <option value="free">Free</option>
        <option value="paid">Paid</option>
        <option value="premium">Premium</option>
        <option value="pro">Pro</option>
      </select>
      <select id="limitFilter" class="select">
        <option value="25">25 rows</option>
        <option value="50" selected>50 rows</option>
        <option value="100">100 rows</option>
        <option value="250">250 rows</option>
      </select>
      <button id="refreshBtn" class="button">Refresh</button>
    </div>

    <div class="summary">
      <div class="card"><div class="label">Total loaded</div><div class="value" id="totalLoaded">0</div></div>
      <div class="card"><div class="label">Free users</div><div class="value" id="freeCount">0</div></div>
      <div class="card"><div class="label">Paid / premium / pro</div><div class="value" id="paidCount">0</div></div>
      <div class="card"><div class="label">Unique emails</div><div class="value" id="uniqueEmails">0</div></div>
    </div>

    <div class="tableWrap">
      <div class="toolbar">
        <div class="status" id="statusText">Loading…</div>
        <div style="display:flex; gap:10px; align-items:center;">
          <button id="exportBtn" class="button secondary">Export CSV</button>
          <button id="logoutBtn" class="button secondary">Log out</button>
        </div>
      </div>

      <div class="tableScroller">
        <table>
          <thead>
            <tr>
              <th>Time</th>
              <th>Student</th>
              <th>Tool</th>
              <th>Tier</th>
              <th>Question</th>
              <th>Response</th>
            </tr>
          </thead>
          <tbody id="reviewsBody"></tbody>
        </table>
      </div>

      <div class="empty" id="emptyState" style="display:none;">No reviews matched your current filters.</div>
    </div>

    <div class="error" id="errorBox"></div>
  </div>

  <script>
    const state = {
      rows: [],
      adminEmail: null,
    };

    const els = {
      searchInput: document.getElementById('searchInput'),
      toolFilter: document.getElementById('toolFilter'),
      tierFilter: document.getElementById('tierFilter'),
      limitFilter: document.getElementById('limitFilter'),
      refreshBtn: document.getElementById('refreshBtn'),
      exportBtn: document.getElementById('exportBtn'),
      logoutBtn: document.getElementById('logoutBtn'),
      reviewsBody: document.getElementById('reviewsBody'),
      statusText: document.getElementById('statusText'),
      errorBox: document.getElementById('errorBox'),
      emptyState: document.getElementById('emptyState'),
      adminBadge: document.getElementById('adminBadge'),
      totalLoaded: document.getElementById('totalLoaded'),
      freeCount: document.getElementById('freeCount'),
      paidCount: document.getElementById('paidCount'),
      uniqueEmails: document.getElementById('uniqueEmails'),
    };

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function formatDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return iso;
      return d.toLocaleString('en-AU', {
        year: 'numeric',
        month: 'short',
        day: 'numeric',
        hour: 'numeric',
        minute: '2-digit'
      });
    }

    function getTierClass(tier) {
      return String(tier || '').toLowerCase();
    }

    function parseFeedback(feedback) {
      if (!feedback) return '—';
      if (typeof feedback === 'object') return JSON.stringify(feedback, null, 2);
      try {
        return JSON.stringify(JSON.parse(feedback), null, 2);
      } catch {
        return String(feedback);
      }
    }

    function applyClientFilters(rows) {
      const q = els.searchInput.value.trim().toLowerCase();
      const tool = els.toolFilter.value.trim().toLowerCase();
      const tier = els.tierFilter.value.trim().toLowerCase();

      return rows.filter((row) => {
        const matchesSearch = !q || [
          row.email,
          row.name,
          row.tool,
          row.question_text,
          row.response_text,
        ].some(v => String(v || '').toLowerCase().includes(q));

        const matchesTool = !tool || String(row.tool || '').toLowerCase() === tool;
        const matchesTier = !tier || String(row.tier || '').toLowerCase() === tier;

        return matchesSearch && matchesTool && matchesTier;
      });
    }

    function renderSummary(rows) {
      const freeCount = rows.filter(r => String(r.tier || '').toLowerCase() === 'free').length;
      const paidCount = rows.length - freeCount;
      const uniqueEmails = new Set(
        rows.map(r => String(r.email || '').toLowerCase()).filter(Boolean)
      ).size;

      els.totalLoaded.textContent = String(rows.length);
      els.freeCount.textContent = String(freeCount);
      els.paidCount.textContent = String(paidCount);
      els.uniqueEmails.textContent = String(uniqueEmails);
    }

    function renderTable() {
      const rows = applyClientFilters(state.rows);
      renderSummary(rows);
      els.reviewsBody.innerHTML = '';
      els.emptyState.style.display = rows.length ? 'none' : 'block';
      els.statusText.textContent = `${rows.length} review${rows.length === 1 ? '' : 's'} shown`;

      for (const row of rows) {
        const detailId = `detail-${row.id}`;

        const tr = document.createElement('tr');
        tr.className = 'data-row';
        tr.innerHTML = `
          <td>${escapeHtml(formatDate(row.created_at))}</td>
          <td>
            <div><strong>${escapeHtml(row.email || 'Unknown')}</strong></div>
            <div class="muted">${escapeHtml(row.name || 'No name')}</div>
          </td>
          <td><span class="badge">${escapeHtml(row.tool || '—')}</span></td>
          <td><span class="badge ${getTierClass(row.tier)}">${escapeHtml(row.tier || '—')}</span></td>
          <td><div class="truncate">${escapeHtml(row.question_text || '')}</div></td>
          <td><div class="truncate">${escapeHtml(row.response_text || '')}</div></td>
        `;

        const detailTr = document.createElement('tr');
        detailTr.className = 'detail-row';
        detailTr.id = detailId;
        detailTr.innerHTML = `
          <td colspan="6" class="detail-panel">
            <div class="detail-grid">
              <div class="detail-box">
                <h4>Question</h4>
                ${escapeHtml(row.question_text || '—')}
              </div>
              <div class="detail-box">
                <h4>Response</h4>
                ${escapeHtml(row.response_text || '—')}
              </div>
              <div class="detail-box">
                <h4>AI feedback</h4>
                ${escapeHtml(parseFeedback(row.ai_feedback))}
              </div>
            </div>
          </td>
        `;

        tr.addEventListener('click', () => {
          detailTr.classList.toggle('open');
        });

        els.reviewsBody.appendChild(tr);
        els.reviewsBody.appendChild(detailTr);
      }
    }

    function setError(message) {
      if (!message) {
        els.errorBox.style.display = 'none';
        els.errorBox.textContent = '';
        return;
      }
      els.errorBox.textContent = message;
      els.errorBox.style.display = 'block';
    }

    async function checkSession() {
      const res = await fetch('/api/admin/session', { credentials: 'include' });
      if (!res.ok) throw new Error('Unable to verify admin session.');
      const data = await res.json();
      if (!data.ok || !data.admin) throw new Error('You are not authorised for this page.');
      state.adminEmail = data.email;
      els.adminBadge.textContent = `Signed in as ${data.email}`;
    }

    async function loadReviews() {
      setError('');
      els.statusText.textContent = 'Loading reviews…';

      const params = new URLSearchParams({
        limit: els.limitFilter.value || '50',
      });

      const res = await fetch(`/api/admin/reviews?${params.toString()}`, { credentials: 'include' });

      if (!res.ok) {
        const msg = await res.text();
        throw new Error(msg || 'Failed to load reviews.');
      }

      const data = await res.json();
      state.rows = Array.isArray(data.rows) ? data.rows : [];
      renderTable();
    }

    async function exportCsv() {
      const params = new URLSearchParams({
        limit: els.limitFilter.value || '50'
      });

      const res = await fetch(`/api/admin/reviews.csv?${params.toString()}`, {
        credentials: 'include'
      });

      if (!res.ok) {
        const msg = await res.text();
        throw new Error(msg || 'CSV export failed.');
      }

      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `key2md-admin-reviews-${new Date().toISOString().slice(0, 10)}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    async function logout() {
      await fetch('/api/auth/logout', {
        method: 'POST',
        credentials: 'include'
      });
      window.location.href = '/';
    }

    function bindEvents() {
      [els.searchInput, els.toolFilter, els.tierFilter].forEach(el => {
        el.addEventListener('input', renderTable);
        el.addEventListener('change', renderTable);
      });

      els.limitFilter.addEventListener('change', () => {
        loadReviews().catch(err => setError(err.message));
      });

      els.refreshBtn.addEventListener('click', () => {
        loadReviews().catch(err => setError(err.message));
      });

      els.exportBtn.addEventListener('click', () => {
        exportCsv().catch(err => setError(err.message));
      });

      els.logoutBtn.addEventListener('click', () => {
        logout().catch(err => setError(err.message));
      });
    }

    (async function init() {
      bindEvents();
      try {
        await checkSession();
        await loadReviews();
      } catch (err) {
        setError(err.message || 'Something went wrong.');
        els.statusText.textContent = 'Access denied';
        els.adminBadge.textContent = 'Not authorised';
      }
    })();
  </script>
</body>
</html>

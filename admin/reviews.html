<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Key2MD Admin Reviews</title>
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta name="referrer" content="no-referrer">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #060d18;
      color: #eef2f8;
    }
    main {
      width: min(100%, 520px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      padding: 28px;
      box-shadow: 0 24px 70px rgba(0,0,0,0.25);
    }
    h1 { margin: 0 0 10px; font-size: 1.6rem; letter-spacing: 0; }
    p { margin: 0; color: #a6b3c6; line-height: 1.65; }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      margin-top: 22px;
      border-radius: 999px;
      padding: 0 18px;
      background: #38bdf8;
      color: #03111f;
      font-weight: 900;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>Reviews moved</h1>
    <p>The old reviews view has been retired. Use the main admin dashboard instead.</p>
    <a href="dashboard.html">Open dashboard</a>
  </main>
</body>
</html>

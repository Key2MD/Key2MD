    async function loadAdminRecording(id='adminVideoPlayer',opts={}){
      const video=document.getElementById(id);
      if(!video)return;
      const key=video.dataset.recordingKey||'';
      setAdminFallbackPoster(video);
      if(!key){initVideoPlayer(id);return;}
      if(video.dataset.loaded==='1' && video.getAttribute('src') && !opts.force && !adminPlaybackExpired(video)){
        initVideoPlayer(id);
        if(opts.playAfterLoad)await playAdminRecording(id);
        return;
      }
      if(opts.force || adminPlaybackExpired(video))clearAdminVideoSource(video);
      if(video.dataset.loading==='1'){
        if(opts.playAfterLoad)video.dataset.playWhenReady='1';
        setVideoState(id,'loading','Creating stream...','The secure playback URL is being prepared.');
        setVideoActionState(id,'loading');
        return;
      }
      video.dataset.loading='1';
      video.dataset.streamFallbackTried='';
      setVideoActionState(id,'loading');
      setVideoState(id,'loading','Preparing secure playback...','Using the same admin dashboard loader for this recording.');
      try{
        const data=await createAdminPlaybackUrl(key);
        const expiresIn=Number(data.expires_in||600);
        video.src=data.playback_url;
        video.dataset.playbackMode='stream';
        video.dataset.loaded='1';
        video.dataset.loading='';
        video.dataset.playbackExpires=String(Date.now()+expiresIn*1000);
        attachVideoDownload(id,data.playback_url,key);
        video.load();
        initVideoPlayer(id);
        setVideoActionState(id,'ready');
        setVideoState(id,'ready','Ready to play',streamReadyMessage(expiresIn));
        const shouldPlay=opts.playAfterLoad || video.dataset.playWhenReady==='1';
        video.dataset.playWhenReady='';
        if(shouldPlay)await playAdminRecording(id);
      }catch(err){
        await loadAdminRecordingFallback(id,key,opts,err);
      }
    }

    async function loadAdminRecordingFallback(id,key,opts={},streamErr=null){
      const video=document.getElementById(id);
      if(!video)return;
      setVideoState(id,'loading','Loading recording...','Dashboard stream failed, so mock-reader is using the admin fallback download path.');
      try{
        const res=await fetch(API_BASE+'/api/admin/mmi/recording?key='+encodeURIComponent(key),{headers:authHeaders()});
        if(!res.ok){
          const data=await res.json().catch(()=>({}));
          throw new Error(data.message||data.error||`Fallback recording fetch failed (${res.status}).`);
        }
        const blob=await res.blob();
        if(video.dataset.blobUrl)URL.revokeObjectURL(video.dataset.blobUrl);
        const url=URL.createObjectURL(blob);
        video.dataset.blobUrl=url;
        video.dataset.playbackMode='blob';
        video.src=url;
        video.dataset.loaded='1';
        video.dataset.loading='';
        video.dataset.playbackExpires='';
        attachVideoDownload(id,url,key);
        video.load();
        initVideoPlayer(id);
        setVideoActionState(id,'ready');
        setVideoState(id,'ready','Ready to play','Loaded through reliable admin playback. Use +/-15s or drag the timeline.');
        const shouldPlay=opts.playAfterLoad || video.dataset.playWhenReady==='1';
        video.dataset.playWhenReady='';
        if(shouldPlay)await playAdminRecording(id);
      }catch(fallbackErr){
        video.dataset.loading='';
        video.dataset.loaded='';
        video.dataset.playbackExpires='';
        video.dataset.playbackMode='';
        video.removeAttribute('src');
        attachVideoDownload(id,'',key);
        setVideoActionState(id,'error');
        const first = streamErr?.message ? `Stream: ${streamErr.message}` : 'Stream endpoint did not complete.';
        const second = fallbackErr?.message ? ` Fallback: ${fallbackErr.message}` : '';
        setVideoState(id,'error','Recording could not be loaded',`${first}${second}`);
      }
    }

    async function reloadAdminRecording(id='adminVideoPlayer'){
      const video=document.getElementById(id);
      if(!video)return;
      clearAdminVideoSource(video);
      await loadAdminRecording(id,{force:true});
    }

    function initVideoPlayer(id='adminVideoPlayer'){
      const video=document.getElementById(id), btn=document.getElementById(id+'Btn'), range=document.getElementById(id+'Range'), fill=document.getElementById(id+'Fill'), time=document.getElementById(id+'Time');
      if(!video||!btn||!range||!fill||!time)return;
      setAdminFallbackPoster(video);
      const dur=()=>effectiveVideoDuration(video);
      const update=()=>{
        const d=dur(), cur=Math.max(0,Number(video.currentTime)||0), pct=d?Math.max(0,Math.min(1,cur/d)):0;
        range.value=String(Math.round(pct*1000));
        fill.style.width=(pct*100)+'%';
        time.textContent=`${fmtTime(cur)} / ${d?fmtTime(d):'--:--'}`;
        btn.innerHTML=video.paused||video.ended?'&#9658;':'&#10074;&#10074;';
        if(video.dataset.loaded==='1'){
          if(video.paused||video.ended)setVideoState(id,'ready','Ready to play','Click play to review the recording with the transcript.');
          else setVideoState(id,'playing','Playing','Transcript highlighting follows the current playback time.');
        }
        syncAdminTranscript(id,cur);
      };
      const seek=async()=>{
        const d=dur();
        if(!d)return;
        const target=(Number(range.value)/1000)*d;
        if(video.dataset.loaded!=='1' || !video.getAttribute('src') || adminPlaybackExpired(video))await loadAdminRecording(id,{force:true});
        applyAdminVideoSeek(video,target);
        update();
      };
      const toggle=()=>{if(video.paused||video.ended)playAdminRecording(id);else video.pause();};
      if(!video.dataset.bound){
        video.dataset.bound='1';
        video.addEventListener('click',toggle);
        range.addEventListener('input',seek);
        range.addEventListener('change',seek);
        ['loadedmetadata','loadeddata'].forEach(ev=>video.addEventListener(ev,()=>{applyPendingAdminVideoSeek(id);tryCaptureAdminPoster(video);update();}));
        video.addEventListener('durationchange',()=>applyPendingAdminVideoSeek(id));
        ['durationchange','timeupdate','play','pause','ended','seeked'].forEach(ev=>video.addEventListener(ev,update));
        video.addEventListener('waiting',()=>setVideoState(id,'loading','Buffering...','The recording is buffering. You can retry the stream if it does not resume.'));
        video.addEventListener('stalled',()=>setVideoState(id,'loading','Connection stalled','Retry the stream if playback does not resume.'));
        video.addEventListener('error',()=>{
          const key=video.dataset.recordingKey||'';
          if(video.dataset.playbackMode==='stream' && key && video.dataset.streamFallbackTried!=='1'){
            video.dataset.streamFallbackTried='1';
            loadAdminRecordingFallback(id,key,{playAfterLoad:video.dataset.playWhenReady==='1'},new Error('The browser could not decode the secure stream.')).catch(()=>{});
            return;
          }
          setVideoActionState(id,'error');
          setVideoState(id,'error','Playback failed','Use Retry to create a fresh secure stream, or download the original file.');
        });
      }
      setVideoActionState(id,video.dataset.loaded==='1'?'ready':'idle');
      update();
    }

    async function playAdminRecording(id='adminVideoPlayer'){
      const video=document.getElementById(id);
      if(!video)return;
      if(video.dataset.loaded!=='1' || !video.getAttribute('src')){
        await loadAdminRecording(id,{playAfterLoad:true});
        return;
      }
      if(adminPlaybackExpired(video)){
        await loadAdminRecording(id,{playAfterLoad:true,force:true});
        return;
      }
      try{
        await video.play();
        setVideoActionState(id,'playing');
        setVideoState(id,'playing','Playing','Transcript highlighting follows the current playback time.');
      }catch{
        setVideoState(id,'ready','Ready to play','Your browser blocked autoplay. Press the play button once more.');
      }
    }

    async function skipAdminRecording(id='adminVideoPlayer',delta=0){
      const video=document.getElementById(id);
      if(!video)return;
      if(video.dataset.loaded!=='1' || !video.getAttribute('src') || adminPlaybackExpired(video)){
        const current=Number(video.currentTime)||0;
        await loadAdminRecording(id,{force:adminPlaybackExpired(video)});
        if(!video.getAttribute('src'))return;
        applyAdminVideoSeek(video,current);
      }
      const duration=effectiveVideoDuration(video);
      const target=(Number(video.currentTime)||0)+Number(delta||0);
      applyAdminVideoSeek(video,Math.max(0,Math.min(duration||Number.MAX_SAFE_INTEGER,target)));
      syncAdminTranscript(id,Number(video.currentTime)||0);
      initVideoPlayer(id);
    }

    async function copyRecordingKey(id='adminVideoPlayer'){
      const video=document.getElementById(id);
      const key=video?.dataset?.recordingKey||'';
      if(!key)return;
      try{await navigator.clipboard.writeText(key);setVideoState(id,video.dataset.loaded==='1'?'ready':'idle','Recording key copied','Paste it into notes or SOS if needed.');}
      catch{setVideoState(id,video.dataset.loaded==='1'?'ready':'idle','Recording key',key);}
    }

    function waitForMediaEvent(el,eventName,timeoutMs=8000){
      return new Promise((resolve,reject)=>{
        let done=false;
        const cleanup=()=>{clearTimeout(timer);el.removeEventListener(eventName,onEvent);el.removeEventListener('error',onError);};
        const finish=(fn,value)=>{if(done)return;done=true;cleanup();fn(value);};
        const onEvent=()=>finish(resolve);
        const onError=()=>finish(reject,new Error('The recording could not be decoded by the browser.'));
        const timer=setTimeout(()=>finish(reject,new Error(`Timed out waiting for ${eventName}.`)),timeoutMs);
        el.addEventListener(eventName,onEvent,{once:true});
        el.addEventListener('error',onError,{once:true});
      });
    }

    function videoCaptureDuration(video){
      return effectiveVideoDuration(video);
    }

    async function waitForVideoPaint(video){
      if(typeof video.requestVideoFrameCallback==='function'){
        await new Promise(resolve=>{
          const timer=setTimeout(resolve,650);
          video.requestVideoFrameCallback(()=>{clearTimeout(timer);resolve();});
        });
        return;
      }
      await new Promise(resolve=>setTimeout(resolve,90));
    }

    async function ensureVideoReadyForFrameCapture(video){
      if(!video)throw new Error('No video player is available for this station.');
      if(video.crossOrigin!=='anonymous')video.crossOrigin='anonymous';
      if((video.dataset.loaded!=='1' || !video.getAttribute('src') || adminPlaybackExpired(video)) && video.dataset.recordingKey){
        await loadAdminRecording(video.id||'adminVideoPlayer',{force:adminPlaybackExpired(video)});
      }
      if(!video.getAttribute('src'))throw new Error('No saved video source is loaded for this station.');
      if(video.readyState<1){
        try{video.load();}catch{}
        await waitForMediaEvent(video,'loadedmetadata',9000);
      }
      if(!video.videoWidth || !video.videoHeight){
        try{await waitForMediaEvent(video,'loadeddata',7000);}catch{}
      }
      if(!video.videoWidth || !video.videoHeight){
        throw new Error('The saved recording loaded, but the browser could not read visual frames from it.');
      }
    }

    async function seekVideoForFrameCapture(video,time){
      const duration=videoCaptureDuration(video);
      const target=Math.max(0.05,Math.min(time,Math.max(0.05,duration-0.08)));
      if(Math.abs((Number(video.currentTime)||0)-target)<0.08 && video.readyState>=2){
        await waitForVideoPaint(video);
        return;
      }
      await new Promise((resolve,reject)=>{
        let done=false;
        const cleanup=()=>{clearTimeout(timer);video.removeEventListener('seeked',onSeeked);video.removeEventListener('error',onError);};
        const finish=(fn,value)=>{if(done)return;done=true;cleanup();fn(value);};
        const onSeeked=()=>finish(resolve);
        const onError=()=>finish(reject,new Error('The browser could not seek through the saved video.'));
        const timer=setTimeout(()=>finish(resolve),6500);
        video.addEventListener('seeked',onSeeked,{once:true});
        video.addEventListener('error',onError,{once:true});
        try{video.currentTime=target;}catch(err){finish(reject,err);}
      });
      await waitForVideoPaint(video);
    }

    async function drawVideoFrameBlob(video){
      const maxWidth=480;
      const scale=Math.min(1,maxWidth/Math.max(1,video.videoWidth));
      const canvas=document.createElement('canvas');
      canvas.width=Math.max(1,Math.round(video.videoWidth*scale));
      canvas.height=Math.max(1,Math.round(video.videoHeight*scale));
      const ctx=canvas.getContext('2d');
      if(!ctx)throw new Error('Could not prepare the frame capture canvas.');
      ctx.drawImage(video,0,0,canvas.width,canvas.height);
      return await new Promise(resolve=>canvas.toBlob(resolve,'image/jpeg',0.82));
    }

    function buildAdminCasperAnswerWindows(promptCount=2){
      const windows=[];
      const readSeconds=10;
      const answerSeconds=60;
      let cursor=0;
      for(let i=0;i<Math.max(1,Math.min(4,Number(promptCount)||2));i++){
        cursor+=readSeconds;
        windows.push({start:cursor+1.5,end:cursor+answerSeconds-1});
        cursor+=answerSeconds;
      }
      return windows;
    }

    function buildAdminFrameSampleTimes(duration,frameLimit,windows=null){
      const safeDuration=Number(duration)||0;
      if(!safeDuration)return [];
      const requested=Array.isArray(windows)?windows:[];
      const ranges=requested.map(w=>{
        const rawStart=Number(w?.start??w?.[0]??0);
        const rawEnd=Number(w?.end??w?.[1]??0);
        const start=Math.max(0.05,Math.min(rawStart,Math.max(0.05,safeDuration-0.12)));
        const end=Math.max(start,Math.min(rawEnd,Math.max(0.08,safeDuration-0.08)));
        return {start,end};
      }).filter(w=>w.end-w.start>=0.6);
      if(!ranges.length){
        ranges.push({start:Math.min(0.6,Math.max(0.05,safeDuration*0.03)),end:Math.max(0.08,safeDuration-0.08)});
      }
      const total=ranges.reduce((sum,w)=>sum+Math.max(0,w.end-w.start),0);
      if(total<=0)return [];
      const count=Math.max(1,Math.min(frameLimit||48,48));
      const times=[];
      for(let i=0;i<count;i++){
        let target=total*((i+0.5)/count);
        let selected=ranges[ranges.length-1].end;
        for(const range of ranges){
          const len=Math.max(0,range.end-range.start);
          if(target<=len){selected=range.start+target;break;}
          target-=len;
        }
        times.push(Math.max(0.05,Math.min(selected,Math.max(0.08,safeDuration-0.08))));
      }
      return times;
    }

    async function captureAdminVideoFrames(videoId='adminVideoPlayer',frameLimit=48,statusEl=null,options={}){
      const video=document.getElementById(videoId);
      await ensureVideoReadyForFrameCapture(video);
      const duration=videoCaptureDuration(video);
      if(!duration)throw new Error('The saved video has no readable duration, so frames could not be sampled.');
      const originalTime=Number(video.currentTime)||0;
      const wasPaused=video.paused;
      const sampleTimes=buildAdminFrameSampleTimes(duration,frameLimit,options.windows);
      const label=options.answerOnly?'answer-window':'saved video';
      const frames=[];
      video.pause();
      try{
        for(let i=0;i<sampleTimes.length;i++){
          if(statusEl)statusEl.textContent=`Sampling ${label} frame ${i+1}/${sampleTimes.length}...`;
          const time=sampleTimes[i];
          await seekVideoForFrameCapture(video,time);
          const blob=await drawVideoFrameBlob(video);
          if(blob && blob.size>900)frames.push(blob);
        }
      }finally{
        try{await seekVideoForFrameCapture(video,Math.min(originalTime,Math.max(0.05,duration-0.08)));}catch{}
        if(wasPaused)video.pause();
        else video.play?.().catch(()=>{});
      }
      if(!frames.length)throw new Error('No usable frames could be sampled from the saved video.');
      return frames;
    }

    function transcriptSegments(row){

          end:Number(seg.end ?? seg.end_time ?? seg.start ?? 0),
          text:String(seg.text || '').trim(),

        .filter(seg=>seg.text);

    function syncAdminTranscript(videoId,time){
      const safeId=window.CSS?.escape ? CSS.escape(videoId) : String(videoId).replace(/["\\]/g,'\\$&');
      const wrap=document.querySelector(`[data-sync-for="${safeId}"]`);
      if(!wrap)return;
      let active=null;
      wrap.querySelectorAll('.mock-sync-segment').forEach(btn=>{
        const start=Number(btn.dataset.start||0);
        const end=Number(btn.dataset.end||start+2.5);
        const on=time>=start && time<Math.max(end,start+0.8);
        btn.classList.toggle('active',on);
        if(on)active=btn;
      });
      if(active && wrap.dataset.lastActive!==String(active.dataset.start)){
        wrap.dataset.lastActive=String(active.dataset.start);
        const wrapRect=wrap.getBoundingClientRect();
        const actRect=active.getBoundingClientRect();
        if(actRect.top<wrapRect.top || actRect.bottom>wrapRect.bottom){
          wrap.scrollTop+=(actRect.top-wrapRect.top)-(wrap.clientHeight-active.offsetHeight)/2;
        }
      }
    }

    async function jumpAdminTranscript(videoId,start){
      const video=document.getElementById(videoId);
      if(!video)return;
      if(video.dataset.loaded!=='1' || !video.getAttribute('src') || adminPlaybackExpired(video)){
        await loadAdminRecording(videoId,{force:adminPlaybackExpired(video)});
      }
      applyAdminVideoSeek(video,Math.max(0,Number(start)||0));
      syncAdminTranscript(videoId,Number(start)||0);
      playAdminRecording(videoId);
    }

        const uploadRescue=`<div class="review-box" style="border-color:#bbf7d0;background:#f0fdf4;">
          <div class="section-label" style="color:#15803d;">SOS upload</div>
          <div class="text-block" style="margin-bottom:10px;">If the student saved a local recording after a crash, upload it here. The worker attaches it to this station, runs the same AI processing, and unlocks the next station when this was the blocked station.</div>
          <input id="adminRecordingUpload" type="file" accept="video/webm,video/mp4,video/quicktime,audio/webm,audio/mpeg,audio/mp4,video/*,audio/*">
          <div style="display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;margin-top:9px;align-items:center;">
            <input id="adminRecordingDuration" type="number" min="1" step="1" placeholder="Duration seconds, optional" value="${esc(r.duration_sec||'')}">
            <button id="uploadRecordingBtn" class="secondary" type="button" onclick="uploadRecordingForCurrentStation()">Upload & process</button>
          </div>
          <div id="uploadRecordingStatus" class="muted" style="margin-top:8px;"></div>
        </div>`;
        return `<div class="station-grid">
          <div>
            ${videoPlayerHtml(key,r)}
            ${stationMonitoringHtml(r)}
            ${issue}
            ${reprocess}
            ${uploadRescue}
            ${transcriptPanelHtml(r,'adminVideoPlayer')}
          </div>
          <div>
            ${scenarioHtml(station)}
            ${feedbackHtml(r.feedback||{}, r)}
          </div>
        </div>`;
      }
      const canReprocessTyped=needsTypedReprocess(r);
      const typedReprocess=canReprocessTyped?`<div class="review-box" style="border-color:#bae6fd;background:#f0f9ff;">
        <div class="section-label" style="color:#0369a1;">Safety net</div>
        <div class="text-block" style="margin-bottom:10px;">Re-run AI feedback from the saved typed answer. Use this when a mock typed station shows a credit/pass issue or no feedback.</div>
        <button id="reprocessBtn" class="secondary" type="button" onclick="reprocessCurrentStation()">Reprocess typed answer</button>
        <div id="reprocessStatus" class="muted" style="margin-top:8px;"></div>
      </div>`:'';
      return `<div class="station-grid">
        <div>
          ${scenarioHtml(station)}
          ${issue}
          ${typedReprocess}
          ${textPanel('Typed answer', r.answer, 'No typed answer captured.')}
          ${stationMonitoringHtml(r)}
        </div>
        <div>${feedbackHtml(r.feedback||{}, r)}</div>
      </div>`;
    }

    function scenarioHtml(station){
      const prompts=[station.prompt1,station.prompt2].filter(Boolean);
      return `<div class="review-box soft">
        <div class="section-label">Scenario</div>
        <div class="text-block">${esc(station.scenario||'No scenario available.')}</div>
        ${prompts.length?`<div class="prompt-list">${prompts.map((prompt,i)=>`
          <div class="prompt-card">
            <div class="section-label">Prompt ${i+1}</div>
            <div class="text-block">${esc(prompt)}</div>
          </div>
        `).join('')}</div>`:''}
      </div>`;
    }

    function textPanel(title,text,empty){
      return `<div class="review-box">
        <div class="section-label">${esc(title)}</div>
        <div class="text-block scroll-block">${esc(text||empty)}</div>
      </div>`;
    }

    function feedbackHtml(fb,row){
      if(!fb || !Object.keys(fb).length){
        const issue=row?.processing_error || row?.reprocess_error || 'No AI feedback returned for this station.';
        return `<div class="feedback-shell"><h3>AI Feedback</h3><div class="muted">${esc(issue)}</div></div>`;
      }
      const overall=fb.overall||{};
      const score=firstText(overall.score,fb.score,row?.score);
      const label=firstText(overall.label,fb.label);
      const strength=firstText(overall.biggest_strength,fb.strengths,fb.strength);
      const improve=firstText(overall.biggest_improvement,fb.improvements,fb.improve);
      const excellent=firstText(overall.excellent_version,fb.excellent_version);
      return `<div class="feedback-shell">
        <div class="feedback-head">
          <div>
            <h3>AI Feedback</h3>
            <div class="muted">${esc(row?.type==='video'?'Video station analysis':'Typed station analysis')}</div>
          </div>
          ${scorePill(score,label)}
        </div>
        ${strength||improve?`<div class="feedback-summary">
          ${strength?`<div class="summary-tile"><strong>Strength</strong><div>${esc(strength)}</div></div>`:''}
          ${improve?`<div class="summary-tile"><strong>Improve</strong><div>${esc(improve)}</div></div>`:''}
        </div>`:''}
        ${excellent?`<div class="summary-tile" style="margin-bottom:12px;"><strong>Excellent response would add</strong><div>${esc(excellent)}</div></div>`:''}
        ${generalFeedbackHtml(fb)}
        ${promptFeedbackHtml(Array.isArray(fb.per_prompt)?fb.per_prompt:[])}
        ${competenciesHtml(fb.competencies)}
        ${presentationHtml(fb.presentation)}
        <details class="raw"><summary>Technical data</summary><pre>${esc(JSON.stringify(fb,null,2))}</pre></details>
      </div>`;
    }

    function generalFeedbackHtml(fb){
      const pairs=[
        ['Empathy',fb.empathy],
        ['Missed point',fb.missed],
        ['Next step',fb.next_step||fb.nextStep],
      ].filter(([,value])=>textOf(value).trim() && textOf(value).trim().toLowerCase()!=='none');
      if(!pairs.length)return '';
      return `<div class="review-box soft">
        <div class="section-label">Station notes</div>
        <div class="data-lines">${pairs.map(([label,value])=>`
          <div class="data-line"><b>${esc(label)}</b><span>${esc(value)}</span></div>
        `).join('')}</div>
      </div>`;
    }

    function promptFeedbackHtml(prompts){
      if(!prompts.length)return '';
      return `<div class="review-box">
        <h3>Prompt feedback</h3>
        <div class="prompt-list">${prompts.map((prompt,i)=>`
          <div class="prompt-card">
            <div class="feedback-head" style="margin-bottom:8px;">
              <div>
                <div class="section-label">Prompt ${Number.isFinite(Number(prompt.prompt_index))?Number(prompt.prompt_index)+1:i+1}</div>
                ${prompt.prompt_text?`<div class="text-block" style="font-size:.84rem;">${esc(prompt.prompt_text)}</div>`:''}
              </div>
              ${promptAveragePill(prompt)}
            </div>
            ${prompt.summary?`<div class="criterion-note" style="margin-bottom:10px;">${esc(prompt.summary)}</div>`:''}
            ${criteriaHtml(prompt.scores||{})}
            ${dataLines(prompt,['prompt_index','prompt_text','scores','summary'])}
          </div>
        `).join('')}</div>
      </div>`;
    }

    function promptAveragePill(prompt){
      const scores=Object.values(prompt?.scores||{}).map(item=>Number(isObj(item)?item.score:item)).filter(Number.isFinite);
      if(!scores.length)return '';
      const avg=Math.round((scores.reduce((sum,n)=>sum+n,0)/scores.length)*10)/10;
      return scorePill(avg,'avg');
    }

    function criteriaHtml(scores){
      const entries=Object.entries(scores||{});
      if(!entries.length)return '';
      return `<div class="criteria-grid">${entries.map(([key,value])=>{
        const item=isObj(value)?value:{score:value};
        const score=item.score;
        const note=firstText(item.comment,item.evidence,item.improve,item.improvement,item.reason,item.note,item.summary,!isObj(value)?value:'');
        const label=firstText(item.label);
        return `<div class="criterion-row">
          <div>
            <div class="criterion-name">${esc(niceKey(key))}</div>
            <div class="mini-label">${scorePill(score,label)}</div>
          </div>
          <div class="criterion-note">${esc(note||'No comment returned.')}</div>
        </div>`;
      }).join('')}</div>`;
    }

    function competenciesHtml(raw){
      if(!raw)return '';
      const list=Array.isArray(raw)
        ? raw
        : Object.entries(raw).map(([key,value])=>isObj(value)?{name:key,...value}:{name:key,score:value});
      const usable=list.filter(Boolean);
      if(!usable.length)return '';
      return `<div class="review-box">
        <h3>Competencies</h3>
        <div class="criteria-grid">${usable.map(item=>{
          const name=firstText(item.name,item.competency,item.label,'Competency');
          const note=firstText(item.improve,item.improvement,item.next_step,item.nextStep,item.evidence,item.reason,item.note,item.comment);
          return `<div class="criterion-row">
            <div>
              <div class="criterion-name">${esc(niceKey(name))}</div>
              <div class="mini-label">${scorePill(item.score,item.label&&item.label!==name?item.label:'')}</div>
            </div>
            <div class="criterion-note">${esc(note||'No note returned.')}</div>
          </div>`;
        }).join('')}</div>
      </div>`;
    }

    function presentationHtml(presentation){
      if(!isObj(presentation))return '';
      const html=dataLines(presentation,[]);
      if(!html)return '';
      return `<div class="review-box">
        <h3>Presentation</h3>
        ${html}
      </div>`;
    }

    async function saveNotes(){
      const res=await fetch(API_BASE+'/api/admin/casper-mock/attempt/'+encodeURIComponent(currentAttempt.id)+'/notes',{method:'POST',headers:{...authHeaders(),'Content-Type':'application/json'},body:JSON.stringify({status:reviewStatus.value,manual_review_notes:manualReviewNotes.value,notes:adminNotes.value})});
      const data=await res.json().catch(()=>({}));
      document.getElementById('saveStatus').textContent=res.ok?'Saved.':(data.error||'Save failed');
    }

    async function deleteCurrentMock(){
      if(!currentAttempt)return;
      const a=currentAttempt;
      const who=a.user_name||a.user_email||'this student';
      if(!confirm('Permanently delete this mock for '+who+'?\n\nThis removes the attempt, every saved recording, and the per-station reviews, and frees them from being resumed into it. This cannot be undone.\n\nIt does NOT restore their mock pass - use Grant Mock on the dashboard if they should be able to start a fresh one.'))return;
      const panel=document.getElementById('attemptPanel');
      panel.innerHTML='<div class="muted">Deleting mock...</div>';
      try{
        const res=await fetch(API_BASE+'/api/admin/casper-mock/attempt/'+encodeURIComponent(a.id)+'/delete',{method:'POST',headers:authHeaders()});
        const data=await res.json().catch(()=>({}));
        if(!res.ok)throw new Error(data.message||data.error||'Delete failed');
        currentAttempt=null;
        panel.innerHTML='<div class="muted">Mock deleted ('+(data.recordings_removed||0)+' recording(s), '+(data.reviews_removed||0)+' review(s) removed). Select another attempt from the list.</div>';
        loadList();
      }catch(err){
        panel.innerHTML='<div class="muted">Delete failed: '+esc(err.message||'unknown error')+'</div>';
      }
    }

    async function buildVideoReprocessBody(row,rowIndex,statusEl){
      const fd=new FormData();
      fd.append('row_index',String(rowIndex));
      const needsVisual=videoNeedsVisualRepair(row);
      const visualOnly=videoNeedsOnlyVisualRepair(row);
      if(needsVisual){
        if(statusEl)statusEl.textContent='Checking saved video and preparing answer-window frame capture...';
        const promptCount=Array.isArray(row.station?.prompts)
          ? row.station.prompts.length
          : [row.station?.prompt1,row.station?.prompt2,row.station?.prompt3,row.station?.prompt4].filter(Boolean).length || 2;
        const frames=await captureAdminVideoFrames('adminVideoPlayer',48,statusEl,{answerOnly:true,windows:buildAdminCasperAnswerWindows(promptCount||2)});
        fd.append('reprocess_visual','1');
        if(visualOnly)fd.append('visual_only','1');
        fd.append('visual_frame_source','answer_windows');
        fd.append('captured_frame_count',String(frames.length));
        appendFramesToFormData(fd,frames);
        if(statusEl)statusEl.textContent=visualOnly
          ? `Sampled ${frames.length} answer-window frames. Updating premium visual feedback only...`
          : `Sampled ${frames.length} answer-window frames. Re-running transcript and scoring with visual metrics...`;
      }
      return fd;
    }

    async function postStationReprocess(rowIndex,statusEl){
      const row=(currentAttempt.rows||[])[rowIndex]||{};
      const isTyped=row.type!=='video';
      const url=API_BASE+'/api/admin/casper-mock/attempt/'+encodeURIComponent(currentAttempt.id)+'/reprocess';
      const options=isTyped
        ? {method:'POST',headers:{...authHeaders(),'Content-Type':'application/json'},body:JSON.stringify({row_index:rowIndex})}
        : {method:'POST',headers:authHeaders(),body:await buildVideoReprocessBody(row,rowIndex,statusEl)};
      const res=await fetch(url,options);
      const data=await res.json().catch(()=>({}));
      if(!res.ok)throw new Error(data.message||data.error||'Reprocess failed');
      return data;
    }

    async function reprocessCurrentStation(){
      if(!currentAttempt)return;
      const row=(currentAttempt.rows||[])[currentStation]||{};
      const isTyped=row.type!=='video';
      const btn=document.getElementById('reprocessBtn');
      const status=document.getElementById('reprocessStatus');
      const visualRepair=videoNeedsOnlyVisualRepair(row);
      if(btn){btn.disabled=true;btn.textContent=visualRepair?'Refreshing visual...':'Reprocessing...';}
      if(status)status.textContent=isTyped?'Running AI feedback from the saved typed answer. This may take a minute.':(visualRepair?'Sampling answer-time frames and refreshing visual feedback only.':'Running transcript and AI feedback from the saved recording. This may take a minute.');
      try{
        const data=await postStationReprocess(currentStation,status);
        currentAttempt=data.attempt||currentAttempt;
        renderAttempt();
      }catch(err){
        if(btn){btn.disabled=false;btn.textContent=isTyped?'Reprocess typed answer':(visualRepair?'Refresh visual only':'Reprocess saved recording');}
        if(status)status.textContent=err.message||'Reprocess failed.';
      }
    }

    async function reprocessAttemptIssues(){
      if(!currentAttempt)return;
      const btn=document.getElementById('reprocessIssuesBtn');
      const status=document.getElementById('bulkReprocessStatus');
      const rows=currentAttempt.rows||[];
      const indexes=rows.map((row,index)=>needsStationReprocess(row)?index:null).filter(Number.isInteger);
      if(!indexes.length)return;
      if(btn){btn.disabled=true;btn.textContent='Checking issues...';}
      try{
        for(let i=0;i<indexes.length;i++){
          const rowIndex=indexes[i];
          currentStation=rowIndex;
          renderAttempt();
          const liveStatus=document.getElementById('reprocessStatus')||document.getElementById('bulkReprocessStatus')||status;
          if(liveStatus)liveStatus.textContent=`Checking station ${rowIndex+1} (${i+1}/${indexes.length})...`;
          const data=await postStationReprocess(rowIndex,liveStatus);
          currentAttempt=data.attempt||currentAttempt;
          if(status)status.textContent=`Reprocessed station ${rowIndex+1} (${i+1}/${indexes.length}).`;
        }
        if(status)status.textContent='Issue reprocessing complete.';
        renderAttempt();
      }catch(err){
        if(btn){btn.disabled=false;btn.textContent=`Check + reprocess ${indexes.length} issue${indexes.length===1?'':'s'}`;}
        const message=err.message||'Bulk reprocess failed.';
        const liveStatus=document.getElementById('reprocessStatus')||status;
        if(liveStatus)liveStatus.textContent=message;
        renderAttempt();
        const nextStatus=document.getElementById('reprocessStatus')||document.getElementById('bulkReprocessStatus');
        if(nextStatus)nextStatus.textContent=message;
      }
    }

    async function reprocessTypedIssues(){
      return reprocessAttemptIssues();
    }

    async function uploadRecordingForCurrentStation(){
      if(!currentAttempt)return;
      const fileInput=document.getElementById('adminRecordingUpload');
      const durationInput=document.getElementById('adminRecordingDuration');
      const btn=document.getElementById('uploadRecordingBtn');
      const status=document.getElementById('uploadRecordingStatus');
      const file=fileInput?.files?.[0]||null;
      if(!file){
        if(status)status.textContent='Choose the student recording file first.';
        return;
      }
      if(btn){btn.disabled=true;btn.textContent='Uploading...';}
      if(status)status.textContent='Uploading the rescue recording and running AI processing. Keep this tab open.';
      try{
        const fd=new FormData();
        fd.append('row_index',String(currentStation));
        fd.append('recording',file,file.name||'student-rescue-recording.webm');
        if(durationInput?.value)fd.append('duration_sec',durationInput.value);
        const res=await fetch(API_BASE+'/api/admin/casper-mock/attempt/'+encodeURIComponent(currentAttempt.id)+'/upload-recording',{
          method:'POST',
          headers:authHeaders(),
          body:fd
        });
        const data=await res.json().catch(()=>({}));
        if(!res.ok)throw new Error(data.message||data.error||'Upload failed');
        currentAttempt=data.attempt||currentAttempt;
        const processed=!!data.processed;
        renderAttempt();
        const nextStatus=document.getElementById('uploadRecordingStatus');
        if(nextStatus)nextStatus.textContent=processed?'Uploaded and processed.':'Uploaded, but AI processing still needs a reprocess run.';
      }catch(err){
        if(btn){btn.disabled=false;btn.textContent='Upload & process';}
        if(status)status.textContent=err.message||'Upload failed.';
      }
    }

    if(adminToken) {
      storeAdminToken(adminToken);
      showApp();
    } else {
      startAdminHandoff();
    }
  </script>
</body>
</html>

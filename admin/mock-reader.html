<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Key2MD Mock Reader</title>
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta name="referrer" content="no-referrer">
  <style>
    :root{
      --navy:#0a1628;
      --ink:#122033;
      --muted:#64748b;
      --soft:#f8fafc;
      --line:#dbe4ee;
      --line-strong:#c6d3e1;
      --blue:#0ea5e9;
      --blue-soft:#e8f6fd;
      --green:#16a34a;
      --green-soft:#ecfdf3;
      --amber:#d97706;
      --amber-soft:#fff7ed;
      --red:#dc2626;
      --red-soft:#fef2f2;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#eef3f7;color:var(--ink)}
    header{background:var(--navy);color:#fff;padding:20px 28px;display:flex;justify-content:space-between;gap:16px;align-items:center;flex-wrap:wrap;border-bottom:1px solid rgba(255,255,255,.08)}
    header h1{margin:0;font-size:1.25rem;line-height:1.2}
    main{max-width:1480px;margin:0 auto;padding:20px}
    h2,h3,h4{color:var(--navy)}
    h3{font-size:.96rem;margin:0 0 10px}
    h4{font-size:.82rem;margin:16px 0 8px}
    .header-link{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.22);border-radius:8px;color:#fff;text-decoration:none;padding:9px 14px;font-weight:800;font-size:.82rem;background:rgba(255,255,255,.08)}
    .header-link:hover{background:rgba(255,255,255,.14)}
    .card,.panel{background:#fff;border:1px solid var(--line);border-radius:8px;padding:18px;margin-bottom:16px;box-shadow:0 10px 24px rgba(15,23,42,.05)}
    .muted{color:var(--muted);font-size:.86rem;line-height:1.55}
    input,textarea,select{width:100%;border:1px solid var(--line-strong);border-radius:8px;padding:10px 12px;font:inherit;color:var(--ink);background:#fff}
    textarea{line-height:1.55;resize:vertical}
    button{border:0;border-radius:8px;background:var(--navy);color:#fff;padding:10px 16px;font-weight:800;cursor:pointer;font-family:inherit}
    button.secondary{background:#fff;color:var(--ink);border:1px solid var(--line-strong)}
    button.secondary:hover,.list-item:hover{border-color:#9fb3c8;background:#f8fbfe}
    .grid{display:grid;grid-template-columns:340px minmax(0,1fr);gap:18px;align-items:start}
    .reader-sidebar{position:sticky;top:16px;max-height:calc(100vh - 32px);overflow:auto}
    .list-item{width:100%;text-align:left;background:#fff;color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:12px;margin-bottom:10px}
    .list-item.active{border-color:var(--blue);background:var(--blue-soft)}
    .list-title{font-weight:900;margin-bottom:4px;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .list-meta{font-size:.76rem;color:var(--muted);line-height:1.45}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}
    .tabs button{background:#fff;color:var(--ink);border:1px solid var(--line-strong);padding:8px 11px;font-size:.78rem}
    .tabs button.has-issue{border-color:#fed7aa;background:#fff7ed;color:#9a3412}
    .tabs button.active{background:var(--navy);color:#fff;border-color:var(--navy)}
    .mode-switch{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 0 12px}
    .mode-switch button{background:#fff;color:var(--ink);border:1px solid var(--line-strong);font-size:.78rem;padding:9px 10px}
    .mode-switch button.active{background:var(--navy);color:#fff;border-color:var(--navy)}
    .attempt-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap;border-bottom:1px solid var(--line);padding-bottom:14px}
    .attempt-head h2{margin:0 0 5px;font-size:1.35rem}
    .metric-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin:14px 0 4px}
    .metric{background:var(--soft);border:1px solid var(--line);border-radius:8px;padding:10px 12px}
    .metric strong{display:block;font-size:1rem;color:var(--navy)}
    .metric span{display:block;font-size:.72rem;color:var(--muted);margin-top:2px}
    .station-grid{display:grid;grid-template-columns:minmax(300px,.9fr) minmax(0,1.1fr);gap:18px;align-items:start}
    .review-box{background:#fff;border:1px solid var(--line);border-radius:8px;padding:15px;margin-bottom:14px}
    .review-box.soft{background:var(--soft)}
    .section-label{font-size:.68rem;font-weight:900;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
    .text-block{white-space:pre-wrap;color:var(--ink);font-size:.9rem;line-height:1.7}
    .scroll-block{max-height:360px;overflow:auto}
    .qa-panel-grid{display:grid;grid-template-columns:minmax(0,.95fr) minmax(290px,.55fr);gap:18px;align-items:start}
    .qa-preview{border:1px solid var(--line);border-radius:8px;background:#fbfdff;overflow:hidden}
    .qa-preview-head{background:#07111f;color:#fff;padding:14px 16px;display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}
    .qa-preview-head h3{color:#fff;margin:0 0 4px;font-size:1rem}
    .qa-preview-body{padding:16px}
    .qa-chip-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}
    .qa-chip{display:inline-flex;align-items:center;gap:5px;border-radius:999px;background:#f1f5f9;color:var(--muted);border:1px solid var(--line);padding:5px 9px;font-size:.72rem;font-weight:850}
    .qa-chip.good{background:var(--green-soft);color:var(--green);border-color:#bbf7d0}
    .qa-chip.warn{background:var(--amber-soft);color:var(--amber);border-color:#fed7aa}
    .qa-chip.risk{background:var(--red-soft);color:var(--red);border-color:#fecaca}
    .qa-check-grid{display:grid;gap:9px;margin:10px 0 12px}
    .qa-check{display:flex;gap:9px;align-items:flex-start;border:1px solid var(--line);border-radius:8px;padding:9px 10px;background:#fff;font-size:.84rem;color:var(--ink)}
    .qa-check input{width:auto;margin-top:2px}
    .qa-station-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .station-tabs button.has-issue{border-color:#fed7aa;background:#fff7ed;color:#9a3412}
    .station-tabs button.checked{border-color:#bbf7d0;background:#f0fdf4;color:#15803d}
    .station-tabs button.active{background:var(--navy);color:#fff;border-color:var(--navy)}
    .prompt-list{display:grid;gap:10px;margin-top:12px}
    .prompt-card{background:#fff;border:1px solid var(--line);border-radius:8px;padding:12px}
    .feedback-shell{background:#fff;border:1px solid var(--line);border-radius:8px;padding:16px}
    .feedback-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}
    .score-pill,.pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;background:var(--blue-soft);color:#0369a1;padding:5px 10px;font-size:.75rem;font-weight:900;white-space:nowrap}
    .score-pill.good{background:var(--green-soft);color:var(--green)}
    .score-pill.warn{background:var(--amber-soft);color:var(--amber)}
    .score-pill.risk{background:var(--red-soft);color:var(--red)}
    .feedback-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin-bottom:12px}
    .summary-tile{border:1px solid var(--line);border-radius:8px;padding:12px;background:var(--soft)}
    .summary-tile strong{display:block;color:var(--navy);font-size:.78rem;margin-bottom:5px}
    .summary-tile div{font-size:.86rem;color:var(--ink);line-height:1.6}
    .criteria-grid{display:grid;gap:9px}
    .criterion-row{display:grid;grid-template-columns:minmax(135px,.35fr) minmax(0,1fr);gap:12px;border-top:1px solid var(--line);padding-top:10px}
    .criterion-name{font-weight:900;color:var(--navy);font-size:.82rem}
    .criterion-note{color:var(--ink);font-size:.84rem;line-height:1.55}
    .mini-label{color:var(--muted);font-size:.72rem;font-weight:800;margin-top:3px}
    .data-lines{display:grid;gap:8px}
    .data-line{display:grid;grid-template-columns:150px minmax(0,1fr);gap:10px;border-top:1px solid var(--line);padding-top:8px;font-size:.84rem;line-height:1.5}
    .data-line b{color:var(--navy)}
    .monitor-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-top:10px}
    .monitor-tile{border:1px solid var(--line);border-radius:8px;background:#fff;padding:10px 12px}
    .monitor-tile strong{display:block;color:var(--navy);font-size:.9rem}
    .monitor-tile span{display:block;color:var(--muted);font-size:.72rem;margin-top:2px;line-height:1.4}
    .monitor-tile.warn{background:var(--amber-soft);border-color:#fed7aa}
    .monitor-tile.risk{background:var(--red-soft);border-color:#fecaca}
    .monitor-tile.good{background:var(--green-soft);border-color:#bbf7d0}
    pre{white-space:pre-wrap;background:#0f172a;color:#e2e8f0;border:1px solid #1e293b;border-radius:8px;padding:12px;line-height:1.55;max-height:320px;overflow:auto}
    details.raw{margin-top:12px}
    details.raw summary{cursor:pointer;color:var(--muted);font-size:.78rem;font-weight:800}
    video{width:100%;aspect-ratio:16/9;background:#000}
    .mock-video-shell{background:#07111f;border:1px solid rgba(10,22,40,.18);border-radius:8px;overflow:hidden;box-shadow:0 10px 28px rgba(10,22,40,.12)}
    .mock-video-stage{position:relative;background:linear-gradient(135deg,#07111f,#10233a);min-height:190px}
    .mock-video-stage video{display:block;position:relative;z-index:1}
    .mock-video-overlay{position:absolute;inset:0;z-index:2;border:0;background:radial-gradient(circle at 50% 38%,rgba(14,165,233,.25),rgba(7,17,31,.94) 58%);color:#fff;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px;cursor:pointer;font:inherit}
    .mock-video-shell.is-loading .mock-video-overlay,.mock-video-shell.is-ready .mock-video-overlay,.mock-video-shell.is-playing .mock-video-overlay{opacity:0;pointer-events:none}
    .mock-video-shell.is-error .mock-video-overlay{background:linear-gradient(135deg,#3b0d0d,#07111f);cursor:default}
    .mock-video-playmark{width:62px;height:62px;border-radius:50%;background:#fff;color:var(--navy);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:1.4rem;font-weight:900;box-shadow:0 18px 44px rgba(0,0,0,.25)}
    .mock-video-overlay-title{font-size:.95rem;font-weight:900;margin-bottom:4px}
    .mock-video-overlay-sub{font-size:.78rem;color:rgba(255,255,255,.72);line-height:1.45;max-width:360px}
    .mock-video-bar{padding:11px 12px 12px;background:#07111f}
    .mock-video-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .mock-video-btn{min-width:38px;height:34px;border-radius:8px;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.08);color:#fff;padding:0 10px;font-size:.75rem;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .mock-video-btn.main{min-width:42px;background:rgba(14,165,233,.16);border-color:rgba(14,165,233,.42)}
    .mock-video-track{position:relative;height:18px;flex:1 1 150px;display:flex;align-items:center;min-width:120px}
    .mock-video-bg{position:absolute;left:0;right:0;height:5px;border-radius:999px;background:rgba(255,255,255,.18);overflow:hidden}
    .mock-video-fill{height:100%;width:0;background:var(--blue);border-radius:999px}
    .mock-video-range{position:absolute;inset:0;width:100%;opacity:0;cursor:pointer}
    .mock-video-time{min-width:74px;text-align:right;color:rgba(255,255,255,.72);font-size:.72rem;font-weight:800;font-variant-numeric:tabular-nums}
    .mock-video-status{padding:7px 12px 0;color:rgba(255,255,255,.62);font-size:.72rem;line-height:1.35}
    .mock-video-actions{display:flex;gap:8px;flex-wrap:wrap;padding:0 12px 12px;background:#07111f}
    .mock-video-action{border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.08);color:#fff;border-radius:8px;padding:7px 10px;font-size:.72rem;font-weight:850;text-decoration:none;cursor:pointer}
    .mock-video-btn:hover,.mock-video-action:hover{background:rgba(255,255,255,.14)}
    .mock-video-action[hidden]{display:none}
    .mock-sync-transcript{max-height:300px;overflow:auto;border:1px solid var(--line);border-radius:8px;background:#fff;padding:8px;display:grid;gap:5px}
    .mock-sync-segment{width:100%;text-align:left;border:0;background:transparent;color:var(--ink);padding:8px 9px;border-radius:7px;font-weight:650;line-height:1.55;font-size:.84rem}
    .mock-sync-segment:hover{background:#f1f7fc;color:var(--navy)}
    .mock-sync-segment.active{background:var(--blue-soft);box-shadow:inset 3px 0 0 var(--blue);color:var(--navy)}
    .mock-sync-time{font-size:.68rem;color:var(--muted);font-weight:900;margin-right:7px;font-variant-numeric:tabular-nums}
    @media(max-width:1060px){.grid,.station-grid,.feedback-summary,.qa-panel-grid{grid-template-columns:1fr}.reader-sidebar{position:static;max-height:none}}
  </style>
 <script defer src="/key2md-tracking.js"></script>
</head>
<body>
  <header>
    <div>
      <h1>Key2MD Mock Reader</h1>
      <div class="muted" style="color:rgba(255,255,255,.68)">Admin-only access to saved Full CASPer Mock attempts and paid manual reviews.</div>
    </div>
    <a class="header-link" href="dashboard.html#mocks">Admin Dashboard</a>
  </header>
  <main>
    <section id="loginCard" class="card">
      <h2>Admin Login</h2>
      <div class="muted">Use the same temporary admin credentials as the dashboard.</div>
      <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:10px;margin-top:12px">
        <input id="adminEmail" placeholder="Admin email">
        <input id="adminPassword" type="password" placeholder="Password">
        <button onclick="login()">Log in</button>
      </div>
      <div id="loginStatus" class="muted" style="margin-top:8px"></div>
    </section>

    <section id="readerApp" style="display:none">
      <div class="grid">
        <aside class="panel reader-sidebar">
          <div style="display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:12px">
            <h2 id="sidebarTitle" style="margin:0;font-size:1rem">Mock Attempts</h2>
            <button class="secondary" onclick="refreshReader()">Refresh</button>
          </div>
          <div class="mode-switch">
            <button id="modeBankBtn" onclick="setReaderMode('bank')">Mock bank QA</button>
            <button id="modeAttemptsBtn" onclick="setReaderMode('attempts')">Student attempts</button>
          </div>
          <div id="attemptScopeControls" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
            <button id="scopeAllBtn" class="secondary" onclick="setScope('all')">All saved</button>
            <button id="scopePaidBtn" class="secondary" onclick="setScope('paid')">Paid reviews</button>
          </div>
          <div id="reviewList" class="muted">Loading...</div>
        </aside>
        <section id="attemptPanel" class="panel">
          <div class="muted">Choose Mock bank QA to inspect the private exam bank, or select a student attempt.</div>
        </section>
      </div>
    </section>
  </main>
  <script>
    const API_BASE = window.API_BASE || 'https://key2md-api.brittainmbbs.workers.dev';
    const qs = new URLSearchParams(window.location.search);
    const TOKEN_KEY = 'k2md_admin_token';
    const LEGACY_HANDOFF_KEY = 'k2md_admin_token_handoff';
    const MOCK_READER_CHANNEL_PREFIX = 'k2md_mock_reader_handoff_';
    const MOCK_QA_NOTES_KEY = 'k2md_mock_bank_qa_notes_v1';
    const handoffId = qs.get('handoff') || '';
    let adminToken = sessionStorage.getItem(TOKEN_KEY) || '';
    let initialAttemptId = qs.get('attempt_id') || '';
    let readerMode = initialAttemptId ? 'attempts' : (qs.get('mode') === 'bank' ? 'bank' : (localStorage.getItem('k2md_mock_reader_mode') || 'bank'));
    let currentAttempt = null;
    let currentStation = 0;
    let mockBank = null;
    let currentBankExam = null;
    let currentBankStation = 0;
    let listScope = qs.get('scope') || localStorage.getItem('k2md_mock_reader_scope') || 'all';
    if (qs.get('admin_token') || qs.get('handoff')) {
      const clean = new URLSearchParams(window.location.search);
      clean.delete('admin_token');
      clean.delete('handoff');
      const next = `${window.location.pathname}${clean.toString() ? '?' + clean.toString() : ''}`;
      history.replaceState(null, '', next);
    }

    function clearLegacyAdminStorage(){
      localStorage.removeItem(LEGACY_HANDOFF_KEY);
      localStorage.removeItem(TOKEN_KEY);
    }

    function storeAdminToken(token){
      adminToken = String(token || '');
      if(!adminToken)return false;
      sessionStorage.setItem(TOKEN_KEY, adminToken);
      clearLegacyAdminStorage();
      return true;
    }

    function esc(v){return String(v ?? '').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));}
    function authHeaders(){return adminToken ? {'Authorization':'Bearer '+adminToken} : {};}
    function isObj(v){return v && typeof v === 'object' && !Array.isArray(v);}
    function textOf(v){
      if(v == null || v === '')return '';
      if(typeof v === 'string' || typeof v === 'number' || typeof v === 'boolean')return String(v);
      return '';
    }
    function firstText(){
      for(const value of arguments){
        const out=textOf(value).trim();
        if(out)return out;
      }
      return '';
    }
    function readableValue(value){
      const direct=textOf(value).trim();
      if(direct)return direct;
      if(Array.isArray(value))return value.map(readableValue).filter(Boolean).join('; ');
      if(isObj(value)){
        const parts=[
          value.score !== undefined && value.score !== null && String(value.score).trim() !== '' ? `Score ${value.score}` : '',
          firstText(value.label,value.comment,value.summary,value.evidence,value.improve,value.improvement,value.reason,value.note),
        ].filter(Boolean);
        return parts.join(' - ');
      }
      return '';
    }
    function niceKey(key){
      const map={
        overall:'Overall',
        score:'Score',
        label:'Label',
        comment:'Comment',
        summary:'Summary',
        empathy:'Empathy',
        communication:'Communication',
        reasoning:'Reasoning',
        reflection:'Reflection',
        real_world_awareness:'Real-world judgement',
        thought_content:'Thought content',
        organisation:'Organisation',
        theme_engagement:'Theme engagement',
        evidence_illustration:'Evidence and illustration',
        language_style:'Language and style',
        biggest_strength:'Biggest strength',
        biggest_improvement:'Biggest improvement',
        excellent_version:'Excellent response would add',
        visual_presence:'Visual presence',
        one_improvement:'One improvement',
        next_step:'Next step',
        nextStep:'Next step',
      };
      return map[key] || String(key || '').replace(/([a-z])([A-Z])/g,'$1 $2').replace(/[_-]+/g,' ').replace(/\b\w/g,ch=>ch.toUpperCase());
    }
    function statusText(value){return String(value || 'not_requested').replace(/_/g,' ');}
    function fmtDateTime(value){
      if(!value)return '';
      const d=new Date(value);
      if(Number.isNaN(d.getTime()))return String(value);
      return d.toLocaleString('en-AU',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
    }
    function scoreTone(score){
      const n=Number(score);
      if(!Number.isFinite(n))return '';
      if(n >= 7)return 'good';
      if(n < 4.5)return 'risk';
      if(n < 5.5)return 'warn';
      return '';
    }
    function scorePill(score,label='',scale='10'){
      const hasScore=score !== null && score !== undefined && String(score).trim() !== '';
      const n=hasScore?Number(score):NaN;
      const main=Number.isFinite(n)?`${Math.round(n*10)/10}/${scale}`:'No score';
      return `<span class="score-pill ${scoreTone(n)}">${esc(main)}${label?` <span>${esc(label)}</span>`:''}</span>`;
    }
    function dataLines(obj, skip=[]){
      if(!isObj(obj))return '';
      const hidden=new Set(skip);
      const rows=Object.entries(obj).map(([key,value])=>[key,readableValue(value)]).filter(([key,value])=>!hidden.has(key)&&value);
      if(!rows.length)return '';
      return `<div class="data-lines">${rows.map(([key,value])=>`
        <div class="data-line"><b>${esc(niceKey(key))}</b><span>${esc(value)}</span></div>
      `).join('')}</div>`;
    }

    function timeAgo(value){
      if(!value)return '';
      const ms=Date.parse(value);
      if(!Number.isFinite(ms))return '';
      const diff=Math.max(0,Date.now()-ms);
      const mins=Math.round(diff/60000);
      if(mins<1)return 'just now';
      if(mins<60)return `${mins} min ago`;
      const hours=Math.round(mins/60);
      if(hours<48)return `${hours} hr ago`;
      const days=Math.round(hours/24);
      return `${days} day${days===1?'':'s'} ago`;
    }

    function monitorTile(label,value,sub='',tone=''){
      const main=value === null || value === undefined || value === '' ? '-' : value;
      return `<div class="monitor-tile ${esc(tone)}"><strong>${esc(main)}</strong><span>${esc(label)}${sub?` - ${esc(sub)}`:''}</span></div>`;
    }

    function attemptActivityLine(row){
      const t=row?.telemetry_summary||{};
      if(!t.last_seen_at)return '';
      const bits=[];
      if(row.status==='in_progress')bits.push(t.active_recently?'Active now':'Last seen '+timeAgo(t.last_seen_at));
      else bits.push('Last activity '+timeAgo(t.last_seen_at));
      if(t.current_station_label)bits.push(`${t.current_station_label}${t.current_phase?` (${t.current_phase})`:''}`);
      if(Number(t.current_answer_chars)>0)bits.push(`${t.current_answer_chars} chars typed`);
      return bits.join(' | ');
    }

    function attemptCompletionSummary(attempt){
      const rows=attempt?.rows||[];
      const saved=rows.length;
      const savedTerminal=rows.filter(row=>row && (row.type==='video'
        ? (!!row.recording_key || !!row.feedback || !!row.processing_error || !!row.reprocess_error || !!row.transcript)
        : (String(row.answer||'').trim().length>0 || !!row.feedback || !!row.processing_error || !!row.reprocess_error)
      )).length;
      const status=String(attempt?.status||'').toLowerCase();
      const completed=status==='completed' || !!attempt?.completed_at || saved>=11 || !!attempt?.report || !!attempt?.has_report;
      const tel=telemetryForAttempt(attempt);
      const lastSeen=tel.last_server_seen_at || tel.last_seen_at || attempt?.updated_at || '';
      const lastSeenMs=Date.parse(lastSeen||'');
      const active=Number.isFinite(lastSeenMs) && Date.now()-lastSeenMs < 5*60*1000 && !completed;
      const current=tel.current_station || tel.current || null;
      const reachedUnsaved=current?.order && saved < Number(current.order);
      if(completed && saved>=11)return {tone:'good',label:'Completed full mock',detail:`${savedTerminal}/11 stations have terminal evidence. Repair/quality flags are not evidence the student quit.`};
      if(active)return {tone:'good',label:'Active now',detail:`Currently around ${current?.station_label || `station ${current?.order || saved+1}`}.`};
      if(reachedUnsaved)return {tone:'warn',label:'Likely technical interruption',detail:`Browser reached station ${current.order}, but only ${saved}/11 stations were saved.`};
      if(saved>0 && saved<11)return {tone:'warn',label:'Left before finishing or paused',detail:`Only ${saved}/11 stations are saved. Last seen ${timeAgo(lastSeen) || 'unknown'}.`};
      return {tone:'warn',label:'No saved progress',detail:lastSeen?`Last seen ${timeAgo(lastSeen)}.`:'No usable timing trail.'};
    }

    function startAdminHandoff(){
      if(adminToken || !handoffId || !('BroadcastChannel' in window))return;
      const channel = new BroadcastChannel(MOCK_READER_CHANNEL_PREFIX + handoffId);
      const ready = () => channel.postMessage({type:'ready'});
      channel.onmessage = event => {
        const message = event.data || {};
        if(message.type === 'admin-token' && storeAdminToken(message.token)){
          channel.close();
          showApp();
        }
      };
      ready();
      setTimeout(ready, 250);
      setTimeout(ready, 1000);
      setTimeout(() => channel.close(), 10000);
    }

    async function login(){
      const status=document.getElementById('loginStatus');
      status.textContent='Checking...';
      const res=await fetch(API_BASE+'/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:adminEmail.value,password:adminPassword.value})});
      const data=await res.json().catch(()=>({}));
      if(!res.ok){status.textContent=data.error||'Login failed';return;}
      storeAdminToken(data.token);
      showApp();
    }

    function showApp(){
      document.getElementById('loginCard').style.display='none';
      document.getElementById('readerApp').style.display='block';
      updateReaderChrome();
      if(readerMode === 'bank'){
        loadBank();
      } else {
        loadList().then(()=>{
          if(initialAttemptId){
            const id = initialAttemptId;
            initialAttemptId = '';
            openAttempt(id);
          }
        });
      }
    }

    function setReaderMode(mode){
      readerMode = mode === 'attempts' ? 'attempts' : 'bank';
      localStorage.setItem('k2md_mock_reader_mode', readerMode);
      currentAttempt = null;
      updateReaderChrome();
      refreshReader();
    }

    function updateReaderChrome(){
      const title=document.getElementById('sidebarTitle');
      const attemptControls=document.getElementById('attemptScopeControls');
      const bankBtn=document.getElementById('modeBankBtn');
      const attemptsBtn=document.getElementById('modeAttemptsBtn');
      if(title)title.textContent=readerMode==='bank'?'Mock Bank QA':'Mock Attempts';
      if(attemptControls)attemptControls.style.display=readerMode==='bank'?'none':'grid';
      if(bankBtn)bankBtn.classList.toggle('active',readerMode==='bank');
      if(attemptsBtn)attemptsBtn.classList.toggle('active',readerMode==='attempts');
    }

    function refreshReader(){
      updateReaderChrome();
      return readerMode === 'bank' ? loadBank() : loadList();
    }

    function setScope(scope){
      listScope = scope === 'paid' ? 'paid' : 'all';
      localStorage.setItem('k2md_mock_reader_scope', listScope);
      readerMode = 'attempts';
      localStorage.setItem('k2md_mock_reader_mode', readerMode);
      updateReaderChrome();
      loadList();
    }

    async function loadList(){
      readerMode = 'attempts';
      localStorage.setItem('k2md_mock_reader_mode', readerMode);
      updateReaderChrome();
      const list=document.getElementById('reviewList');
      list.textContent='Loading...';
      const allBtn=document.getElementById('scopeAllBtn'), paidBtn=document.getElementById('scopePaidBtn');
      if(allBtn&&paidBtn){
        allBtn.style.background=listScope==='all'?'var(--navy)':'#fff'; allBtn.style.color=listScope==='all'?'#fff':'var(--ink)';
        paidBtn.style.background=listScope==='paid'?'var(--navy)':'#fff'; paidBtn.style.color=listScope==='paid'?'#fff':'var(--ink)';
      }
      const endpoint = listScope === 'paid' ? '/api/admin/casper-mock/manual-reviews' : '/api/admin/casper-mock/attempts';
      const res=await fetch(API_BASE+endpoint,{headers:authHeaders()});
      const data=await res.json().catch(()=>({}));
      if(!res.ok){list.textContent=data.error||'Could not load reviews';return;}
      const rows=data.rows||[];
      list.innerHTML=rows.length?rows.map(r=>`
        <button class="list-item ${currentAttempt?.id===r.id?'active':''}" data-attempt-id="${esc(r.id)}" onclick="openAttempt('${esc(r.id)}')">
          <div class="list-title">${esc(r.user_name||r.user_email||'Student')}</div>
          <div class="list-meta">${esc(r.user_email||'No email')}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin:9px 0 7px;">
            <span class="pill">${esc(r.tier||'mock')}</span>
            <span class="score-pill ${r.manual_review_paid?'good':(r.status==='in_progress'?'warn':'')}">${r.manual_review_paid ? 'Paid review' : (r.status==='in_progress' ? 'In progress' : 'Saved mock')}</span>
            ${r.telemetry_summary?.access_timing?`<span class="pill">${esc(accessTimingInfo(r.telemetry_summary.access_timing).short)} timing</span>`:''}
          </div>
          <div class="list-meta">${esc(statusText(r.manual_review_status))}${r.completed_at ? ' | ' + esc(fmtDateTime(r.completed_at)) : ''}</div>
          ${attemptActivityLine(r)?`<div class="list-meta" style="margin-top:4px;color:${r.telemetry_summary?.active_recently?'#16a34a':'var(--muted)'}">${esc(attemptActivityLine(r))}</div>`:''}
        </button>
      `).join(''):(listScope === 'paid' ? 'No paid manual reviews yet.' : 'No saved mock attempts yet.');
      return rows;
    }

    async function loadBank(){
      readerMode = 'bank';
      localStorage.setItem('k2md_mock_reader_mode', readerMode);
      updateReaderChrome();
      const list=document.getElementById('reviewList');
      const panel=document.getElementById('attemptPanel');
      list.textContent='Loading private mock bank...';
      if(panel)panel.innerHTML='<div class="muted">Loading station bank...</div>';
      const res=await fetch(API_BASE+'/api/admin/casper-mock/bank?include_stations=1',{headers:authHeaders()});
      const data=await res.json().catch(()=>({}));
      if(!res.ok){
        list.textContent=data.message||data.error||'Could not load mock bank';
        if(panel)panel.innerHTML='<div class="muted">'+esc(data.message||data.error||'Could not load mock bank')+'</div>';
        return;
      }
      mockBank=data;
      const rows=data.rows||[];
      const preferred=currentBankExam?.slug||qs.get('mock_slug')||rows[0]?.slug||'';
      currentBankExam=rows.find(row=>row.slug===preferred)||rows[0]||null;
      currentBankStation=Math.max(0,Math.min(currentBankStation,(currentBankExam?.stations||[]).length-1));
      renderBankList();
      renderBankExam();
    }

    function renderBankList(){
      const list=document.getElementById('reviewList');
      const rows=mockBank?.rows||[];
      if(!rows.length){
        list.textContent='No active private mocks found.';
        return;
      }
      list.innerHTML=rows.map((exam,index)=>{
        const stations=exam.stations||[];
        const issues=bankExamIssues(exam);
        const checked=stations.length && stations.every(station=>bankQaComplete(exam,station));
        return `<button class="list-item ${currentBankExam?.slug===exam.slug?'active':''}" data-mock-slug="${esc(exam.slug)}" onclick="openBankExam(${index})">
          <div class="list-title">${esc(exam.title||exam.slug||'Mock exam')}</div>
          <div class="list-meta">${esc(exam.slug||'No slug')}</div>
          <div class="qa-chip-row">
            <span class="qa-chip ${exam.exact_ready?'good':'warn'}">${exam.exact_ready?'Ready':'Check bank'}</span>
            <span class="qa-chip">${Number(exam.station_count||stations.length||0)} stations</span>
            ${checked?'<span class="qa-chip good">QA checked</span>':''}
            ${issues.length?`<span class="qa-chip warn">${issues.length} issue${issues.length===1?'':'s'}</span>`:''}
          </div>
        </button>`;
      }).join('');
    }

    function openBankExam(index){
      const rows=mockBank?.rows||[];
      currentBankExam=rows[index]||rows[0]||null;
      currentBankStation=0;
      renderBankList();
      renderBankExam();
    }

    function showBankStation(index){
      const stations=currentBankExam?.stations||[];
      currentBankStation=Math.max(0,Math.min(Number(index)||0,Math.max(0,stations.length-1)));
      renderBankExam();
    }

    function bankQaNotes(){
      try{return JSON.parse(localStorage.getItem(MOCK_QA_NOTES_KEY)||'{}')||{};}catch{return {};}
    }

    function saveBankQaNotes(map){
      try{localStorage.setItem(MOCK_QA_NOTES_KEY,JSON.stringify(map||{}));}catch{}
    }

    function bankQaKey(exam,station){
      return `${exam?.slug||exam?.id||'mock'}:${station?.order||0}`;
    }

    function bankQaState(exam,station){
      return bankQaNotes()[bankQaKey(exam,station)]||{};
    }

    function bankQaComplete(exam,station){
      const state=bankQaState(exam,station);
      return !!(state.scenario_ok && state.prompt1_ok && state.prompt2_ok && state.type_ok && !state.needs_edit);
    }

    function saveBankQaField(field,value,rerender=false){
      if(!currentBankExam)return;
      const station=(currentBankExam.stations||[])[currentBankStation];
      if(!station)return;
      const map=bankQaNotes();
      const key=bankQaKey(currentBankExam,station);
      map[key]={...(map[key]||{}),[field]:value,updated_at:new Date().toISOString()};
      saveBankQaNotes(map);
      if(rerender){
        renderBankList();
        renderBankExam();
      }
    }

    function wordCount(text){
      return String(text||'').trim().split(/\s+/).filter(Boolean).length;
    }

    function bankStationLabel(exam,station){
      const stations=exam?.stations||[];
      const upto=stations.filter(item=>Number(item.order||0)<=Number(station?.order||0));
      const local=upto.filter(item=>item.type===station?.type).length||1;
      return `${station?.type==='video'?'Video':'Typed'} ${local}`;
    }

    function bankStationIssues(exam,station){
      const issues=[];
      if(!String(station?.scenario||'').trim())issues.push('Missing scenario');
      const prompts=(station?.prompts||[]).filter(prompt=>String(prompt.text||'').trim());
      if(prompts.length<2)issues.push('Needs two prompts');
      const expected=Number(station?.order||0)<=4?'video':'typed';
      if(station?.type!==expected)issues.push(`Expected ${expected}`);
      const text=[station?.scenario,...(station?.prompts||[]).map(prompt=>prompt.text)].join(' ');
      if(/\b(todo|placeholder|lorem ipsum|sample only)\b/i.test(text))issues.push('Placeholder text');
      return issues;
    }

    function readableOrderList(values){
      const cleaned=(values||[]).map(v=>String(v||'').trim()).filter(Boolean);
      return cleaned.length?cleaned.join(', '):'unknown';
    }

    function bankExamIssues(exam){
      const issues=[];
      const stations=exam?.stations||[];
      const stationCount=Number(exam?.station_count||stations.length||0);
      if(stationCount!==11)issues.push(`Expected 11 stations, found ${stationCount}`);
      if((exam?.extra_station_orders||[]).length)issues.push(`Extra station order(s): ${readableOrderList(exam.extra_station_orders)}. Safe admin repair can remove these.`);
      if((exam?.invalid_type_orders||[]).length)issues.push(`Invalid station type at order(s): ${readableOrderList(exam.invalid_type_orders)}`);
      if((exam?.missing_station_orders||[]).length)issues.push(`Missing station order(s): ${readableOrderList(exam.missing_station_orders)}`);
      if((exam?.wrong_type_orders||[]).length)issues.push(`Wrong video/typed type at station(s): ${readableOrderList(exam.wrong_type_orders)}`);
      if((exam?.missing_prompt_orders||[]).length)issues.push(`Missing prompt(s) at station(s): ${readableOrderList(exam.missing_prompt_orders)}`);
      if(exam && !exam.sequence_valid)issues.push('Sequence must be Video 1-4, then Typed 5-11');
      if(!exam?.exact_ready && !issues.length)issues.push('Bank structure');
      for(const station of exam?.stations||[])issues.push(...bankStationIssues(exam,station).map(issue=>`Station ${station.order}: ${issue}`));
      return [...new Set(issues)];
    }

    function bankExamHasRepairableExtraStations(exam){
      return !!((exam?.extra_station_orders||[]).length);
    }

    async function repairBankExamExtraStations(){
      if(!currentBankExam || !bankExamHasRepairableExtraStations(currentBankExam))return;
      const slug=currentBankExam.slug;
      const extras=readableOrderList(currentBankExam.extra_station_orders);
      const ok=confirm(`Remove only the extra station row(s) for ${currentBankExam.title||slug}: ${extras}? Stations 1-11 will be left untouched.`);
      if(!ok)return;
      const panel=document.getElementById('attemptPanel');
      const note=panel?.querySelector('.attempt-head .muted');
      if(note)note.textContent='Repairing extra mock bank rows...';
      try{
        const res=await fetch(API_BASE+'/api/admin/casper-mock/bank/repair',{
          method:'POST',
          headers:{...authHeaders(),'Content-Type':'application/json'},
          body:JSON.stringify({slug,repair:'extra_stations'})
        });
        const data=await res.json().catch(()=>({}));
        if(!res.ok)throw new Error(data.message||data.error||'Repair failed');
        mockBank=data;
        const rows=mockBank?.rows||[];
        currentBankExam=rows.find(row=>row.slug===slug)||rows[0]||null;
        currentBankStation=Math.max(0,Math.min(currentBankStation,(currentBankExam?.stations||[]).length-1));
        renderBankList();
        renderBankExam();
        alert(`Done. Removed ${Number(data.removed_station_count||0)} extra station row(s).`);
      }catch(err){
        alert(err?.message||'Repair failed');
        renderBankExam();
      }
    }

    function renderBankExam(){
      const panel=document.getElementById('attemptPanel');
      if(!panel)return;
      if(!currentBankExam){
        panel.innerHTML='<div class="muted">No active private mock is available.</div>';
        return;
      }
      const exam=currentBankExam;
      const stations=exam.stations||[];
      const station=stations[currentBankStation]||null;
      const issues=bankExamIssues(exam);
      const checkedCount=stations.filter(item=>bankQaComplete(exam,item)).length;
      const tabs=stations.map((item,index)=>{
        const itemIssues=bankStationIssues(exam,item);
        const checked=bankQaComplete(exam,item);
        const label=bankStationLabel(exam,item);
        return `<button class="${index===currentBankStation?'active':''} ${itemIssues.length?'has-issue':''} ${checked?'checked':''}" onclick="showBankStation(${index})">${esc(label)}${itemIssues.length?' - check':checked?' - OK':''}</button>`;
      }).join('');
      panel.innerHTML=`
        <div class="attempt-head">
          <div>
            <h2>${esc(exam.title||exam.slug||'Mock exam')}</h2>
            <div class="muted">${esc(exam.slug||'No slug')} | Private D1 mock bank | Does not create an attempt or use a pass</div>
          </div>
          <div class="qa-station-actions">
            <button class="secondary" onclick="showBankStation(${currentBankStation-1})" ${currentBankStation<=0?'disabled':''}>Previous</button>
            <button class="secondary" onclick="showBankStation(${currentBankStation+1})" ${currentBankStation>=stations.length-1?'disabled':''}>Next</button>
            <button class="secondary" onclick="copyBankExamSummary()">Copy audit summary</button>
            ${bankExamHasRepairableExtraStations(exam)?'<button class="secondary" style="border-color:#fb923c;color:#9a3412;" onclick="repairBankExamExtraStations()">Repair extra rows</button>':''}
          </div>
        </div>
        <div class="metric-row">
          <div class="metric"><strong>${Number(exam.station_count||stations.length||0)}/11</strong><span>Stations in bank</span></div>
          <div class="metric"><strong>${Number(exam.video_count||stations.filter(s=>s.type==='video').length||0)}</strong><span>Video stations</span></div>
          <div class="metric"><strong>${Number(exam.typed_count||stations.filter(s=>s.type==='typed').length||0)}</strong><span>Typed stations</span></div>
          <div class="metric"><strong>${checkedCount}/${stations.length}</strong><span>Stations QA checked locally</span></div>
          <div class="metric"><strong>${issues.length || '0'}</strong><span>Potential issues</span></div>
        </div>
        ${issues.length?`<div class="review-box" style="border-color:#fed7aa;background:#fff7ed;"><div class="section-label" style="color:#c2410c;">Audit flags</div><div class="data-lines">${issues.slice(0,12).map(issue=>`<div class="data-line"><b>Check</b><span>${esc(issue)}</span></div>`).join('')}</div></div>`:''}
        <div class="tabs station-tabs">${tabs}</div>
        ${station?bankStationHtml(exam,station):'<div class="muted">No station selected.</div>'}
      `;
    }

    function bankStationHtml(exam,station){
      const state=bankQaState(exam,station);
      const prompts=(station.prompts||[]).slice().sort((a,b)=>Number(a.order||0)-Number(b.order||0));
      const issues=bankStationIssues(exam,station);
      const label=bankStationLabel(exam,station);
      const typeTotal=station.type==='video'
        ? (exam.stations||[]).filter(item=>item.type==='video').length
        : (exam.stations||[]).filter(item=>item.type==='typed').length;
      const localNumber=(exam.stations||[]).filter(item=>item.type===station.type && Number(item.order||0)<=Number(station.order||0)).length||1;
      return `<div class="qa-panel-grid">
        <div class="qa-preview">
          <div class="qa-preview-head">
            <div>
              <h3>${esc(label)} of ${typeTotal}</h3>
              <div style="color:rgba(255,255,255,.68);font-size:.8rem;">Station ${Number(station.order||0)} of 11 | ${esc(station.category||'CASPer')}</div>
            </div>
            <span class="score-pill ${station.type==='video'?'good':''}">${esc(station.type==='video'?'Video response':'Typed response')}</span>
          </div>
          <div class="qa-preview-body">
            <div class="qa-chip-row">
              <span class="qa-chip">Scenario read: ${Number(station.timing?.scenario_read_seconds||30)} sec</span>
              <span class="qa-chip">Prompts: ${prompts.length}</span>
              <span class="qa-chip">Scenario: ${wordCount(station.scenario)} words</span>
              <span class="qa-chip">${esc(station.handwritten_by||'Dan')}</span>
            </div>
            <div class="review-box soft" style="margin-top:14px;">
              <div class="section-label">Scenario</div>
              <div class="text-block">${esc(station.scenario||'No scenario available.')}</div>
            </div>
            <div class="prompt-list">${prompts.map((prompt,i)=>`
              <div class="prompt-card">
                <div class="section-label">Prompt ${Number(prompt.order||i+1)}</div>
                <div class="text-block">${esc(prompt.text||'No prompt text.')}</div>
                <div class="qa-chip-row">
                  <span class="qa-chip">${wordCount(prompt.text)} words</span>
                  ${Number(prompt.read_seconds||0)?`<span class="qa-chip">Read ${Number(prompt.read_seconds)} sec</span>`:''}
                  ${Number(prompt.answer_seconds||0)?`<span class="qa-chip">Answer ${Number(prompt.answer_seconds)} sec</span>`:''}
                </div>
              </div>
            `).join('')||'<div class="muted">No prompts found for this station.</div>'}</div>
          </div>
        </div>
        <aside>
          <div class="review-box">
            <h3>QA checklist</h3>
            <div class="muted">This checklist is saved only in this admin browser. It helps you run through all mocks without changing the student bank.</div>
            <div class="qa-check-grid">
              ${qaCheckHtml('scenario_ok','Scenario reads correctly',state.scenario_ok)}
              ${qaCheckHtml('prompt1_ok','Prompt 1 is clear and realistic',state.prompt1_ok)}
              ${qaCheckHtml('prompt2_ok','Prompt 2 is clear and realistic',state.prompt2_ok)}
              ${qaCheckHtml('type_ok',`Station type/order is right (${localNumber}/${typeTotal})`,state.type_ok)}
              ${qaCheckHtml('needs_edit','Needs an edit before students see it',state.needs_edit,true)}
            </div>
            <textarea rows="6" placeholder="Private QA notes for this station..." oninput="saveBankQaField('notes',this.value)">${esc(state.notes||'')}</textarea>
            <div class="qa-station-actions">
              <button class="secondary" onclick="copyBankStationText()">Copy station text</button>
              <button class="secondary" onclick="clearBankQaForStation()">Clear QA</button>
            </div>
          </div>
          <div class="review-box">
            <h3>Station diagnostics</h3>
            <div class="data-lines">
              <div class="data-line"><b>Station ID</b><span>${esc(station.id||'')}</span></div>
              <div class="data-line"><b>Order</b><span>${Number(station.order||0)}</span></div>
              <div class="data-line"><b>Expected type</b><span>${Number(station.order||0)<=4?'video':'typed'}</span></div>
              <div class="data-line"><b>Prompt count</b><span>${prompts.length}</span></div>
              <div class="data-line"><b>Flags</b><span>${esc(issues.join('; ')||'No obvious flags')}</span></div>
            </div>
          </div>
        </aside>
      </div>`;
    }

    function qaCheckHtml(field,label,checked,risk=false){
      return `<label class="qa-check"><input type="checkbox" ${checked?'checked':''} onchange="saveBankQaField('${field}',this.checked,true)"><span style="${risk?'color:#991b1b;font-weight:850;':''}">${esc(label)}</span></label>`;
    }

    async function copyText(value,success='Copied.'){
      try{
        await navigator.clipboard.writeText(value);
        const panel=document.getElementById('attemptPanel');
        const note=panel?.querySelector('.attempt-head .muted');
        if(note)note.textContent=success;
      }catch{
        alert(value);
      }
    }

    function bankStationText(exam,station){
      const prompts=(station?.prompts||[]).slice().sort((a,b)=>Number(a.order||0)-Number(b.order||0));
      return [
        `${exam?.title||exam?.slug||'Mock exam'} - ${bankStationLabel(exam,station)} (station ${station?.order||''})`,
        '',
        'Scenario:',
        station?.scenario||'',
        '',
        ...prompts.flatMap(prompt=>[`Prompt ${prompt.order}:`,prompt.text||'','']),
      ].join('\n').trim();
    }

    function copyBankStationText(){
      const station=(currentBankExam?.stations||[])[currentBankStation];
      if(!station)return;
      copyText(bankStationText(currentBankExam,station),'Station text copied.');
    }

    function copyBankExamSummary(){
      if(!currentBankExam)return;
      const lines=[
        `${currentBankExam.title||currentBankExam.slug} audit`,
        `Ready: ${currentBankExam.exact_ready?'yes':'no'}`,
        `Stations: ${currentBankExam.station_count || (currentBankExam.stations||[]).length}/11`,
        `Video: ${currentBankExam.video_count || (currentBankExam.stations||[]).filter(s=>s.type==='video').length}`,
        `Typed: ${currentBankExam.typed_count || (currentBankExam.stations||[]).filter(s=>s.type==='typed').length}`,
        '',
        ...bankExamIssues(currentBankExam).map(issue=>`- ${issue}`),
      ];
      copyText(lines.join('\n'),'Mock audit summary copied.');
    }

    function clearBankQaForStation(){
      const station=(currentBankExam?.stations||[])[currentBankStation];
      if(!station)return;
      const map=bankQaNotes();
      delete map[bankQaKey(currentBankExam,station)];
      saveBankQaNotes(map);
      renderBankList();
      renderBankExam();
    }

    async function openAttempt(id){
      readerMode='attempts';
      localStorage.setItem('k2md_mock_reader_mode', readerMode);
      updateReaderChrome();
      const panel=document.getElementById('attemptPanel');
      panel.innerHTML='<div class="muted">Loading attempt...</div>';
      const res=await fetch(API_BASE+'/api/admin/casper-mock/attempt/'+encodeURIComponent(id),{headers:authHeaders()});
      const data=await res.json().catch(()=>({}));
      if(!res.ok){panel.innerHTML='<div class="muted">'+esc(data.error||'Could not load attempt')+'</div>';return;}
      currentAttempt=data.attempt; currentStation=0; markActiveAttempt(id); renderAttempt();
    }

    function markActiveAttempt(id){
      document.querySelectorAll('[data-attempt-id]').forEach(btn=>btn.classList.toggle('active', btn.dataset.attemptId===id));
    }

    function renderAttempt(){
      const a=currentAttempt, rows=a.rows||[];
      const scored=rows.map(stationScore).filter(Number.isFinite);
      const analysed=rows.filter(hasFeedback);
      const avg=scored.length?Math.round((scored.reduce((sum,n)=>sum+n,0)/scored.length)*10)/10:'-';
      const videoCount=rows.filter(r=>r.type==='video').length;
      const typedCount=rows.filter(r=>r.type!=='video').length;
      const reprocessIssueCount=rows.filter(needsStationReprocess).length;
      const issueSummaries=stationIssueSummaries(rows);
      const completionSummary=attemptCompletionSummary(a);
      const trueIssueCount=rows.filter(row=>row?.processing_error || row?.reprocess_error || needsTypedReprocess(row) || (needsVideoReprocess(row) && !videoNeedsOnlyVisualRepair(row))).length;
      const visualIssueCount=rows.filter(videoNeedsOnlyVisualRepair).length;
      const accessTiming=attemptAccessTiming(a);
      const tabs=rows.map((r,i)=>{
        const score=stationScore(r);
        const issueLabel=stationIssueLabel(r);
        const classes=[i===currentStation?'active':'',issueLabel?'has-issue':''].filter(Boolean).join(' ');
        return `<button class="${classes}" onclick="currentStation=${i};renderAttempt()">${r.type==='video'?'Video':'Typed'} ${r.localIndex||i+1}${Number.isFinite(score)?` - ${Math.round(score*10)/10}`:''}${issueLabel?` - ${esc(issueLabel)}`:''}</button>`;
      }).join('');
      document.getElementById('attemptPanel').innerHTML=`
        <div class="attempt-head">
          <div>
            <h2 style="margin:0">${esc(a.user_name||a.user_email||'Student')}</h2>
            <div class="muted">${esc(a.user_email||'No email')} | <span class="pill">${esc(a.tier||'mock')}</span> | <span class="pill">${esc(accessTiming.short)} typed timing</span> | ${esc(statusText(a.manual_review_status||'pending_review'))}</div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;">
          ${reprocessIssueCount?`<button id="reprocessIssuesBtn" class="secondary" onclick="reprocessAttemptIssues()">Check + reprocess ${reprocessIssueCount} flag${reprocessIssueCount===1?'':'s'}</button>`:''}
          <button class="secondary" onclick="saveNotes()">Save notes</button>
          <button class="secondary" type="button" onclick="deleteCurrentMock()" style="border-color:#dc2626;color:#dc2626;">Delete this mock</button>
          </div>
        </div>
        <div class="monitor-grid" style="margin:14px 0 4px;">
          ${monitorTile('Attempt interpretation',completionSummary.label,completionSummary.detail,completionSummary.tone)}
          ${monitorTile('True processing issues',trueIssueCount,visualIssueCount?`${visualIssueCount} visual-only flag${visualIssueCount===1?'':'s'} separately`:'',trueIssueCount?'warn':'good')}
          ${monitorTile('Visual-only flags',visualIssueCount,visualIssueCount?'Premium video can be visually refreshed from playback frames':'No premium visual repair flags',visualIssueCount?'warn':'good')}
        </div>
        <div class="metric-row">
          <div class="metric"><strong>${esc(avg)}</strong><span>Average reviewed score</span></div>
          <div class="metric"><strong>${analysed.length}/${rows.length}</strong><span>Stations with AI feedback</span></div>
          <div class="metric"><strong>${videoCount}</strong><span>Video stations</span></div>
          <div class="metric"><strong>${typedCount}</strong><span>Typed stations</span></div>
          <div class="metric"><strong>${esc(accessTiming.short)}</strong><span>${esc(fmtTime(accessTiming.seconds))} typed timing</span></div>
          <div class="metric"><strong>${esc(fmtDateTime(a.completed_at)||'-')}</strong><span>Completed</span></div>
        </div>
        ${attemptMonitoringHtml(a)}
        ${issueSummaries.length?`<div class="qa-chip-row" style="margin:12px 0 0;">${issueSummaries.map(item=>`<button class="qa-chip warn" type="button" onclick="currentStation=${item.index};renderAttempt()">${esc(item.label)}: ${esc(item.detail)}</button>`).join('')}</div>`:''}
          ${reprocessIssueCount?`<div id="bulkReprocessStatus" class="muted" style="margin:0 0 12px;">Flags include genuine failed analyses and premium visual-only refreshes. Completed 11/11 mocks are not half-finished just because visual repair flags remain.</div>`:''}
        ${attemptCompletionNotesHtml(a)}
        <div class="tabs">${tabs}</div>
        <div>${stationHtml(rows[currentStation])}</div>
        <div class="review-box" style="margin-top:16px">
          <h3>Manual review result</h3>
          <select id="reviewStatus" style="max-width:240px;margin-bottom:10px">
            ${['pending_review','in_review','completed'].map(s=>`<option value="${s}" ${a.manual_review_status===s?'selected':''}>${s}</option>`).join('')}
          </select>
          <textarea id="manualReviewNotes" rows="7" placeholder="Student-facing manual review result. This appears in the student's history when status is completed.">${esc(a.manual_review_notes||'')}</textarea>
          <h3 style="margin-top:16px;">Private admin notes</h3>
          <textarea id="adminNotes" rows="5" placeholder="Internal notes only. These are not shown to the student.">${esc(a.admin_notes||'')}</textarea>
          <div id="saveStatus" class="muted" style="margin-top:8px"></div>
        </div>
      `;
      if(rows[currentStation]?.type==='video') setTimeout(()=>initVideoPlayer('adminVideoPlayer'),0);

    function fmtTime(seconds){
      const total=Math.max(0,Math.round(Number(seconds)||0));
      const m=Math.floor(total/60), s=total%60;
      return `${m}:${String(s).padStart(2,'0')}`;
    }

    function fmtDuration(seconds){
      const total=Math.max(0,Math.round(Number(seconds)||0));
      if(!total)return '-';
      if(total<3600)return fmtTime(total);
      const h=Math.floor(total/3600);
      const m=Math.round((total%3600)/60);
      return `${h}h ${m}m`;
    }

    function normaliseAccessTiming(value){
      const raw=String(value||'').trim().toLowerCase().replace(/\s+/g,'');
      if(raw==='1.5'||raw==='1.5x'||raw==='x1.5'||raw==='x15'||raw==='15'||raw==='150')return 'x15';
      if(raw==='2'||raw==='2x'||raw==='x2'||raw==='200')return 'x2';
      return 'standard';
    }

    function accessTimingInfo(value){
      const key=normaliseAccessTiming(value?.key||value?.mode||value);
      if(key==='x15')return {key,label:'1.5x access timing',short:'1.5x',seconds:315};
      if(key==='x2')return {key,label:'2x access timing',short:'2x',seconds:420};
      return {key:'standard',label:'Standard timing',short:'Standard',seconds:210};
    }

    function attemptAccessTiming(attempt=currentAttempt){
      const rows=attempt?.rows||[];
      const rowTiming=rows.map(row=>row?.access_timing||row?.accessTiming||row?.timing?.access_timing).find(Boolean);
      const saved=attempt?.access_timing||attempt?.accessTiming||attempt?.report?.accessTiming||attempt?.report?.access_timing||attempt?.telemetry?.access_timing||attempt?.telemetry_summary?.access_timing||rowTiming;
      return accessTimingInfo(saved);
    }

    function rowAccessTiming(row){
      return accessTimingInfo(row?.access_timing||row?.accessTiming||row?.timing?.access_timing||attemptAccessTiming());
    }

    function telemetryForAttempt(attempt=currentAttempt){
      return attempt?.telemetry && typeof attempt.telemetry==='object' ? attempt.telemetry : {};
    }

    function attemptMonitoringHtml(attempt){
      const tel=telemetryForAttempt(attempt);
      const current=tel.current_station || tel.current || null;
      const visibility=tel.visibility || {};
      const rows=attempt?.rows||[];
      const lastSeen=tel.last_server_seen_at || tel.last_seen_at || attempt?.updated_at || '';
      const lastSeenMs=Date.parse(lastSeen||'');
      const activeRecently=Number.isFinite(lastSeenMs) && Date.now()-lastSeenMs < 5*60*1000 && (attempt?.status||'')==='in_progress';
      const reachedUnsaved=current?.order && rows.length < Number(current.order);
      const breakRows=Array.isArray(tel.breaks)?tel.breaks:[];
      const recoveryRows=Array.isArray(attempt?.recovery_events)?attempt.recovery_events:[];
      const statusTone=activeRecently?'good':((attempt?.status||'')==='in_progress'?'warn':'');
      const statusText=activeRecently?'Active now':((attempt?.status||'')==='in_progress'?'Not currently active':'Finished/closed');
      const hasTelemetry=!!(tel.started_at || lastSeen || current || breakRows.length);
      const accessTiming=attemptAccessTiming(attempt);
      if(!hasTelemetry){
        return `<div class="review-box soft">
          <div class="section-label">Monitoring</div>
          <div class="muted">No timing trail is saved for this attempt. Older mocks will only show the stations that were already saved.</div>
        </div>`;
      }
      const currentLine=current?[
        current.station_label || `Station ${current.order||''}`.trim(),
        current.phase ? `phase: ${current.phase}` : '',
        current.visible===false ? 'tab hidden' : '',
        Number(current.answer_chars)>0 ? `${current.answer_chars} chars / ${current.answer_words||0} words` : '',
      ].filter(Boolean).join(' | '):'No current page reported';
      return `<div class="review-box soft">
        <div class="section-label">Monitoring</div>
        <div class="monitor-grid">
          ${monitorTile('Status',statusText,timeAgo(lastSeen),statusTone)}
          ${monitorTile('Started',fmtDateTime(tel.started_at || attempt?.started_at),tel.browser?.timezone || '')}
          ${monitorTile('Last seen',fmtDateTime(lastSeen),timeAgo(lastSeen))}
          ${monitorTile('Last heartbeat',tel.last_heartbeat_reason || tel.last_reason || '-','')}
          ${monitorTile('Saved stations',`${rows.length}/11`,reachedUnsaved?'student reached a later unsaved station':'')}
          ${monitorTile('Typed timing',accessTiming.short,`${fmtTime(accessTiming.seconds)} per typed station`)}
          ${monitorTile('Current page',currentLine,'',reachedUnsaved?'warn':'')}
          ${monitorTile('Tab hidden',fmtDuration(Math.round(Number(visibility.hidden_ms||0)/1000)),`${visibility.hidden_count||0} switch${Number(visibility.hidden_count||0)===1?'':'es'}`)}
        </div>
        ${breakRows.length?`<div style="margin-top:12px">${dataLines({
          breaks: breakRows.map(b=>`${b.title||'Break'}: ${fmtDuration(b.elapsed_sec)} used${b.skipped?' (skipped early)':''}`).join('; ')
        })}</div>`:''}
        ${recoveryRows.length?`<div style="margin-top:12px">${dataLines({
          recovery: recoveryRows.slice(-4).map(e=>`${fmtDateTime(e.at)}: server progress repaired from ${e.db_current_station_order||'?'} to ${e.saved_next_station_order||'?'}${e.rescue_pending?' (SOS pending)':''}`).join('; ')
        })}</div>`:''}
        ${tel.browser?`<details class="raw"><summary>Browser/session details</summary><pre>${esc(JSON.stringify(tel.browser,null,2))}</pre></details>`:''}
      </div>`;
    }

    function attemptCompletionNotesHtml(attempt){
      const rows=attempt?.rows||[];
      const summary=attemptCompletionSummary(attempt);
      const tel=telemetryForAttempt(attempt);
      const breakRows=Array.isArray(tel.breaks)?tel.breaks:[];
      const clues=[];
      if(summary.tone==='good' && rows.length>=11)clues.push('This mock is complete from a saved-station perspective.');
      if(summary.label.includes('technical'))clues.push('This looks more like a save/progress interruption than an intentional quit.');
      if(summary.label.includes('Left before'))clues.push('This is the group that may have intentionally quit, paused, lost connection, or decided to only practise part of the mock.');
      if(breakRows.some(b=>b?.skipped))clues.push('Skipped breaks are common and do not by themselves mean the student quit.');
      if(!clues.length)return '';
      return `<div class="review-box soft" style="margin-top:12px;margin-bottom:12px;">
        <div class="section-label">Quit vs bug read</div>
        <div class="text-block">${esc(clues.join(' '))}</div>
      </div>`;
    }

    function stationMonitoringHtml(row){
      const timing=row?.timing || {};
      const typing=row?.typing || timing.typing || null;
      const hasTiming=!!(timing.started_at || timing.ended_at || typing);
      if(!hasTiming){
        return `<div class="review-box soft">
          <div class="section-label">Station monitoring</div>
          <div class="muted">No per-station timing was recorded for this station.</div>
        </div>`;
      }
      const typedPasteRisk=!!(typing?.possible_paste_or_external_draft);
      const tiles=[
        monitorTile('Opened',fmtDateTime(timing.started_at),timing.local_started_at||''),
        monitorTile('Submitted',fmtDateTime(timing.ended_at || timing.submitted_at),''),
        monitorTile('Time on page',fmtDuration(timing.elapsed_sec),`${fmtDuration(timing.visible_sec)} visible`),
        monitorTile('Tab hidden',fmtDuration(timing.hidden_sec),`${timing.hidden_count||0} switch${Number(timing.hidden_count||0)===1?'':'es'}`,Number(timing.hidden_sec)>30?'warn':''),
      ];
      if(row?.type==='video'){
        tiles.push(monitorTile('Recording length',fmtDuration(timing.recording_duration_sec || rowDuration(row)),timing.submission_kind||''));
      }
      if(typing){
        const accessTiming=rowAccessTiming(row);
        tiles.push(monitorTile('Access timing',accessTiming.short,`${fmtTime(accessTiming.seconds)} allowed`));
        tiles.push(monitorTile('First typing',fmtDuration(typing.first_input_delay_sec),'after page opened'));
        tiles.push(monitorTile('Active typing focus',fmtDuration(typing.active_focus_sec),`${typing.focus_count||0} focus event${Number(typing.focus_count||0)===1?'':'s'}`));
        tiles.push(monitorTile('Keystrokes',typing.keydown_count||0,`${typing.input_events||0} input events`));
        tiles.push(monitorTile('Paste events',typing.paste_events||0,`${typing.paste_chars||0} pasted chars`,typedPasteRisk?'warn':''));
        tiles.push(monitorTile('Large inserts',typing.large_insert_events||0,`${typing.largest_insert_chars||0} largest insert`,typedPasteRisk?'warn':''));
        tiles.push(monitorTile('Final typed size',`${typing.final_chars||0} chars`,`${typing.final_words||0} words`));
      }
      return `<div class="review-box soft">
        <div class="section-label">Station monitoring</div>
        <div class="monitor-grid">${tiles.join('')}</div>
        ${typedPasteRisk?`<div class="muted" style="margin-top:10px;color:#9a3412;"><strong>Admin-only timing signal, not a marking error.</strong> This records paste/large-insert size and timing only, not clipboard contents. It does not block the student's report.</div>`:''}
        ${Array.isArray(timing.events)&&timing.events.length?`<details class="raw"><summary>Timing events</summary><pre>${esc(JSON.stringify(timing.events,null,2))}</pre></details>`:''}
      </div>`;
    }

    function rowDuration(r){
      const candidates=[r?.duration_sec,r?.durationSec,r?.rawFeedback?.durationSec,r?.feedback?.durationSec];
      const found=candidates.map(Number).find(v=>Number.isFinite(v)&&v>0);
      return found||0;
    }

    function hasFeedback(row){
      return !!(row?.feedback && typeof row.feedback==='object' && Object.keys(row.feedback).length);
    }

    function needsTypedReprocess(row){
      return row?.type!=='video' && String(row?.answer||'').trim().length>=20 && (!hasFeedback(row) || !!row.processing_error || !!row.reprocess_error);
    }

    function rowTier(row){
      return String(row?.tier || currentAttempt?.tier || '').toLowerCase();
    }

    function hasVisualMetrics(row){
      const value=row?.visual_metrics || row?.visualMetrics;
      return !!(value && typeof value==='object' && Object.keys(value).length);
    }

    function videoNeedsVisualRepair(row){
      return row?.type==='video'
        && rowTier(row)==='premium'
        && !!row.recording_key
        && (!!row.visual_degraded || !hasVisualMetrics(row));
    }

    function videoNeedsOnlyVisualRepair(row){
      return videoNeedsVisualRepair(row)
        && hasFeedback(row)
        && String(row.transcript||'').trim().length>=10
        && !row.processing_error;
    }

    function needsVideoReprocess(row){
      if(row?.type!=='video' || !row.recording_key)return false;
      return !hasFeedback(row)
        || !!row.processing_error
        || !!row.reprocess_error
        || !String(row.transcript||'').trim()
        || videoNeedsVisualRepair(row);
    }

    function needsStationReprocess(row){
      return needsTypedReprocess(row) || needsVideoReprocess(row);
    }

    function stationIssueDetail(row){
      if(!row)return '';
      if(row.processing_error)return String(row.processing_error);
      if(row.reprocess_error)return String(row.reprocess_error);
      if(videoNeedsVisualRepair(row)){
        if(row.visual_degraded)return 'Premium visual analysis was degraded or missing.';
        return 'Premium visual metrics are missing from this saved video.';
      }
      if(needsTypedReprocess(row))return 'Typed answer has no usable AI feedback.';
      if(needsVideoReprocess(row))return 'Saved recording needs transcript or AI feedback repair.';
      return '';
    }

    function stationIssueLabel(row){
      const detail=stationIssueDetail(row);
      if(!detail)return '';
      if(videoNeedsVisualRepair(row))return 'visual';
      if(row?.processing_error || row?.reprocess_error)return 'issue';
      return 'repair';
    }

    function stationIssueSummaries(rows){
      return (rows||[]).map((row,index)=>{
        const detail=stationIssueDetail(row);
        if(!detail)return null;
        const type=row?.type==='video'?'Video':'Typed';
        const local=row?.localIndex||index+1;
        return {index,label:`${type} ${local}`,detail:detail.slice(0,140)};
      }).filter(Boolean);
    }

    function stationScore(row){
      if(!hasFeedback(row))return null;
      const fb=row.feedback||{}, overall=fb.overall||{};
      const score=Number(overall.score ?? fb.score ?? row.score);
      return Number.isFinite(score)&&score>0 ? score : null;
    }

    function videoPlayerHtml(recordingKey,r,id='adminVideoPlayer'){
      const duration=rowDuration(r);
      if(!recordingKey){
        return `<div class="mock-video-shell" style="min-height:190px;display:flex;align-items:center;justify-content:center;color:#fff;text-align:center;padding:18px;">
          <div>
            <div class="mock-video-playmark" style="background:rgba(255,255,255,.12);color:#fff;">!</div>
            <div style="font-weight:850;margin-bottom:6px;">No recording key saved</div>
            <div style="font-size:0.78rem;color:rgba(255,255,255,0.68);line-height:1.5;">${duration?`The browser captured about ${fmtTime(duration)}, but the analysis/upload did not return a playable recording.`:'The video upload did not complete for this station.'}</div>
          </div>
        </div>`;
      }
      return `<div class="mock-video-shell">
        <div class="mock-video-stage">
          <video id="${id}" crossorigin="anonymous" controls playsinline preload="metadata" data-recording-key="${esc(recordingKey)}" data-duration="${duration||''}" style="cursor:pointer"></video>
          <button type="button" id="${id}Overlay" class="mock-video-overlay" data-video-action="play" data-video-id="${esc(id)}">
            <span>
              <span class="mock-video-playmark">&#9658;</span>
              <span class="mock-video-overlay-title" id="${id}OverlayTitle">Load recording</span>
              <span class="mock-video-overlay-sub" id="${id}OverlaySub">Uses the same secure admin dashboard loader, with a fallback if the stream fails.</span>
            </span>
          </button>
        </div>
        <div class="mock-video-bar">
          <div class="mock-video-row">
            <button type="button" class="mock-video-btn" data-video-action="skip" data-video-id="${esc(id)}" data-video-delta="-15">-15s</button>
            <button type="button" id="${id}Btn" class="mock-video-btn main" data-video-action="play" data-video-id="${esc(id)}" aria-label="Play recording">&#9658;</button>
            <button type="button" class="mock-video-btn" data-video-action="skip" data-video-id="${esc(id)}" data-video-delta="15">+15s</button>
            <div class="mock-video-track">
              <div class="mock-video-bg"><div id="${id}Fill" class="mock-video-fill"></div></div>
              <input id="${id}Range" class="mock-video-range" type="range" min="0" max="1000" value="0" aria-label="Seek recording">
            </div>
            <div id="${id}Time" class="mock-video-time">0:00 / ${duration?fmtTime(duration):'--:--'}</div>
          </div>
          <div id="${id}Status" class="mock-video-status">Recording is ready to load.</div>
        </div>
        <div class="mock-video-actions">
          <button type="button" id="${id}LoadBtn" class="mock-video-action" data-video-action="load" data-video-id="${esc(id)}">Load recording</button>
          <button type="button" id="${id}RetryBtn" class="mock-video-action" data-video-action="retry" data-video-id="${esc(id)}" hidden>Retry stream</button>
          <a id="${id}Download" class="mock-video-action" href="#" target="_blank" rel="noopener" download hidden>Download original</a>
          <button type="button" class="mock-video-action" data-video-action="copy" data-video-id="${esc(id)}">Copy key</button>
        </div>
      </div>`;
    }

    function videoShell(video){
      return video?.closest?.('.mock-video-shell') || null;
    }

    function setVideoState(id,state,title,sub){
      const video=document.getElementById(id);
      const shell=videoShell(video);
      const status=document.getElementById(id+'Status');
      const overlayTitle=document.getElementById(id+'OverlayTitle');
      const overlaySub=document.getElementById(id+'OverlaySub');
      if(shell){
        shell.classList.toggle('is-loading',state==='loading');
        shell.classList.toggle('is-ready',state==='ready');
        shell.classList.toggle('is-playing',state==='playing');
        shell.classList.toggle('is-error',state==='error');
      }
      if(status)status.textContent=sub||title||'';
      if(overlayTitle)overlayTitle.textContent=title||'Recording';
      if(overlaySub)overlaySub.textContent=sub||'';
    }

    function setAdminFallbackPoster(video){
      if(!video || video.poster)return;
      const canvas=document.createElement('canvas');
      canvas.width=1280; canvas.height=720;
      const ctx=canvas.getContext('2d');
      if(!ctx)return;
      const grad=ctx.createLinearGradient(0,0,1280,720);
      grad.addColorStop(0,'#07111f');
      grad.addColorStop(0.55,'#12324f');
      grad.addColorStop(1,'#07111f');
      ctx.fillStyle=grad; ctx.fillRect(0,0,1280,720);
      ctx.fillStyle='rgba(14,165,233,0.18)'; ctx.beginPath(); ctx.arc(640,300,170,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#ffffff'; ctx.beginPath(); ctx.moveTo(605,260); ctx.lineTo(605,380); ctx.lineTo(705,320); ctx.closePath(); ctx.fill();
      ctx.font='700 36px Inter, system-ui, sans-serif'; ctx.textAlign='center'; ctx.fillText('CASPer mock recording',640,470);
      video.poster=canvas.toDataURL('image/jpeg',0.82);
    }

    function effectiveVideoDuration(video){
      const native=Number(video?.duration);
      const hinted=Number(video?.dataset?.duration||0);
      const hasNative=Number.isFinite(native)&&native>0&&native<86400;
      const hasHint=Number.isFinite(hinted)&&hinted>0&&hinted<86400;
      if(hasNative&&hasHint){
        if(native < hinted*0.55 || native > hinted*1.8)return hinted;
        return native;
      }
      if(hasNative)return native;
      if(hasHint)return hinted;
      return 0;
    }

    function adminPlaybackExpired(video,bufferMs=15000){
      const expires=Number(video?.dataset?.playbackExpires||0);
      return video?.dataset?.playbackMode==='stream'
        && Number.isFinite(expires)
        && expires>0
        && Date.now()+bufferMs>=expires;
    }

    function applyAdminVideoSeek(video,target){
      if(!video)return;
      const safeTarget=Math.max(0,Number(target)||0);
      try{
        video.currentTime=safeTarget;
        video.dataset.pendingSeek='';
      }catch{
        video.dataset.pendingSeek=String(safeTarget);
      }
    }

    function applyPendingAdminVideoSeek(id='adminVideoPlayer'){
      const video=document.getElementById(id);
      const pending=Number(video?.dataset?.pendingSeek||NaN);
      if(!video || !Number.isFinite(pending))return;
      applyAdminVideoSeek(video,pending);
      syncAdminTranscript(id,Number(video.currentTime)||pending||0);
    }

    function clearAdminVideoSource(video){
      if(!video)return;
      try{video.pause?.();}catch{}
      if(video.dataset.blobUrl){
        try{URL.revokeObjectURL(video.dataset.blobUrl);}catch{}
      }
      video.dataset.blobUrl='';
      video.dataset.loaded='';
      video.dataset.loading='';
      video.dataset.playbackExpires='';
      video.dataset.playbackMode='';
      video.dataset.streamFallbackTried='';
      video.dataset.pendingSeek='';
      video.removeAttribute('src');
      try{video.load();}catch{}
    }

    function streamReadyMessage(expiresIn){
      const mins=Math.max(1,Math.round(Number(expiresIn||600)/60));
      return `Stream ready for about ${mins} min. Retry creates a fresh stream if this page stays open.`;
    }

    function tryCaptureAdminPoster(video){
      if(!video || video.dataset.posterCaptureStarted==='1')return;
      video.dataset.posterCaptureStarted='1';
      const duration=effectiveVideoDuration(video);
      if(!duration || !video.videoWidth || !video.videoHeight)return;
      const target=Math.min(Math.max(duration*0.08,0.35),Math.max(0.35,duration-0.15),1.5);
      const original=Number(video.currentTime)||0;
      const draw=()=>{
        try{
          const canvas=document.createElement('canvas');
          canvas.width=video.videoWidth; canvas.height=video.videoHeight;
          const ctx=canvas.getContext('2d');
          ctx.drawImage(video,0,0,canvas.width,canvas.height);
          video.poster=canvas.toDataURL('image/jpeg',0.82);
        }catch{}
        if(Math.abs((Number(video.currentTime)||0)-target)<0.2){
          try{ video.currentTime=original; }catch{}
        }
      };
      if(Math.abs(original-target)<0.15){ draw(); return; }
      const onSeeked=()=>{ video.removeEventListener('seeked',onSeeked); draw(); };
      video.addEventListener('seeked',onSeeked);
      try{ video.currentTime=target; }catch{ video.removeEventListener('seeked',onSeeked); }
    }

    async function createAdminPlaybackUrl(key){
      const res=await fetch(API_BASE+'/api/admin/mmi/recording-token',{
        method:'POST',
        headers:{...authHeaders(),'Content-Type':'application/json'},
        body:JSON.stringify({key})
      });
      const data=await res.json().catch(()=>({}));
      if(!res.ok || !data.playback_url)throw new Error(data.message||data.error||'Could not create secure playback URL.');
      return data;
    }

        load.disabled=state==='loading';

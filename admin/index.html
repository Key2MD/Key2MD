<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet" />
  <title>Admin Sign In</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #07111f 0%, #0b1220 100%);
      color: #f4f7fb;
      font-family: Inter, system-ui, sans-serif;
    }
    .box {
      width: min(460px, calc(100vw - 24px));
      padding: 24px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      box-shadow: 0 16px 40px rgba(0,0,0,0.24);
    }
    h1 { margin-top: 0; }
    input, button {
      width: 100%;
      min-height: 48px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: #fff;
      padding: 12px 14px;
      margin-bottom: 12px;
      box-sizing: border-box;
    }
    button { cursor: pointer; font-weight: 700; }
    .error { color: #fecaca; min-height: 1.2rem; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Admin Sign In</h1>
    <p>Private internal access only.</p>
    <form id="loginForm">
      <input id="email" type="email" autocomplete="username" placeholder="Email" required />
      <input id="password" type="password" autocomplete="current-password" placeholder="Password" required />
      <button type="submit">Sign in</button>
      <div class="error" id="error"></div>
    </form>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const error = document.getElementById('error');
      error.textContent = '';
      const res = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ email, password })
      });
      if (!res.ok) {
        error.textContent = 'Sign in failed.';
        return;
      }
      location.href = '/admin/reviews.html';
    });
  </script>
</body>
</html>

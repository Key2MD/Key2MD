    body {

      color: #0a1628;

    }

      margin: 0;
      max-width: 520px;
      font-size: clamp(2rem, 5vw, 3rem);

      color: #475569;
      font-size: 1rem;
      line-height: 1.65;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 24px;
    }

      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      border-radius: 999px;

      font-size: 0.92rem;
      font-weight: 900;

      border: 1px solid #0a1628;

      color: #ffffff;

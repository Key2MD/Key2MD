<!DOCTYPE html>
<html lang="en-AU">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Full Mock Report — Key2MD</title>
 <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
 <link rel="icon" href="/favicon.ico">
 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
 <link rel="stylesheet" href="mock-report-redesign.css">
 <script src="auth.js" defer></script>
</head>
<body>
 <div class="k2-mock-report">
  <div class="k2mr-topbar">
   <div class="k2mr-topbar-inner">
    <a class="k2mr-logo" href="index.html">key2<span>md</span></a>
    <div class="k2mr-nav">
     <a href="history.html">Back to history</a>
     <a href="full-casper-mock-exam.html">Take another mock</a>
     <button type="button" onclick="window.print()">Print report</button>
    </div>
   </div>
  </div>
  <div class="k2mr-wrap">
   <div id="content" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:18px;padding:48px 32px;text-align:center;">
    <h2 style="font-family:'DM Serif Display',serif;font-size:1.5rem;color:#fff;margin-bottom:8px;">Loading your full mock report…</h2>
    <p style="font-size:0.9rem;color:rgba(255,255,255,0.55);">Please wait while the report is opened securely.</p>
   </div>
  </div>
 </div>
 <script>
  const API_BASE='https://key2md-api.brittainmbbs.workers.dev';
  const TOKEN_KEY='key2md_token';
  const content=document.getElementById('content');
  let attempt=null;
  function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
  function attr(v){return esc(v).replace(/`/g,'&#96;');}
  function fmtDate(v){if(!v)return'';try{return new Intl.DateTimeFormat('en-AU',{dateStyle:'medium',timeStyle:'short'}).format(new Date(v));}catch{return String(v);}}
  function fmtDur(s){const n=Math.max(0,Math.round(Number(s)||0));return`${Math.floor(n/60)}:${String(n%60).padStart(2,'0')}`;}
  function scoreColor(n){n=Number(n);if(!Number.isFinite(n))return'rgba(255,255,255,0.4)';if(n>=7)return'var(--green)';if(n>=5.5)return'var(--teal2)';if(n>=4.5)return'#fbbf24';return'var(--red)';}
  function safeN(v){if(v==null||v==='')return null;const n=Number(v);return Number.isFinite(n)&&n>0?Math.round(n*10)/10:null;}
  function hasFb(row){return!!(row?.feedback&&typeof row.feedback==='object'&&Object.keys(row.feedback).length);}
  function rowScore(row){if(!hasFb(row))return'–';const n=safeN(row.feedback?.overall?.score??row.feedback?.score??row.score);return Number.isFinite(n)?`${n}/10`:'–';}
  function getFb(row){const fb=row.feedback||{},ov=fb.overall||{},issue=row.processing_error||row.reprocess_error;if(!hasFb(row)&&issue)return{strength:'AI analysis did not complete.',improve:issue,empathy:'',missed:'',excellent:''};return{strength:ov.biggest_strength||fb.strengths||fb.strength||'',improve:ov.biggest_improvement||fb.improvements||fb.improve||'',empathy:fb.empathy||'',missed:fb.missed||'',excellent:ov.excellent_version||fb.excellent_version||''};}
  function numScore(row){return safeN(row?.feedback?.overall?.score??row?.feedback?.score??row?.score);}
  function avgScore(rows){const vals=rows.map(numScore).filter(Number.isFinite);return vals.length?Math.round((vals.reduce((a,b)=>a+b,0)/vals.length)*10)/10:'–';}
  function statusLabel(s){return s==='ready'?'Ready':s==='work'?'Needs work':'Watch';}
  function statusClass(s){return s==='ready'?'ready':s==='work'?'work':'watch';}
  function paramsId(){return new URLSearchParams(location.search).get('id')||'';}
  function fbTile(cls,label,body){if(!body)return'';return`<div class="k2mr-fb-tile ${cls}"><div class="k2mr-fb-lbl">${label}</div><div class="k2mr-fb-body">${esc(body)}</div></div>`;}
  document.addEventListener('DOMContentLoaded',()=>{Key2MDAuth.init({tool:'casper',apiBase:API_BASE,onAuthChange:user=>{if(user)loadReport();else showLogin();}});});
  function showLogin(){content.innerHTML=`<h2 style="font-family:'DM Serif Display',serif;font-size:1.6rem;color:#fff;margin-bottom:8px;">Log in to view this report</h2><p style="color:rgba(255,255,255,0.6);margin-bottom:20px;">Your mock report is private to your account.</p><button class="k2mr-btn k2mr-btn-primary" style="font-family:inherit;" onclick="Key2MDAuth.showAuthModal('login')">Log in</button>`;}
  async function loadReport(){const id=paramsId(),token=localStorage.getItem(TOKEN_KEY);if(!id){content.innerHTML='<h2 style="font-family:\'DM Serif Display\',serif;font-size:1.4rem;color:#fff;">Missing report ID</h2><p style="color:rgba(255,255,255,0.6);margin-top:8px;">Open this page from your history.</p>';return;}try{const res=await fetch(`${API_BASE}/api/casper-mock/attempt/${encodeURIComponent(id)}`,{headers:{Authorization:`Bearer ${token}`}});const data=await res.json().catch(()=>({}));if(!res.ok)throw new Error(data.message||data.error||'Could not load report.');attempt=data.attempt;renderReport();}catch(err){content.innerHTML=`<h2 style="font-family:'DM Serif Display',serif;font-size:1.4rem;color:#fff;">Could not open report</h2><p style="color:rgba(255,255,255,0.6);margin:10px 0 20px;">${esc(err.message||'Try again later.')}</p><a class="k2mr-btn k2mr-btn-primary" href="history.html" style="font-family:inherit;text-decoration:none;">Back to history</a>`;}}
  function renderReport(){
   const rows=attempt.rows||[],report=attempt.report||{};
   const videoRows=rows.filter(r=>r.type==='video'),typedRows=rows.filter(r=>r.type!=='video');
   const reviewedCount=rows.map(numScore).filter(Number.isFinite).length;
   const overallScore=avgScore(rows);
   const interp=report.interpretation||{};
   const bandClass=interp.tone==='strong'?'strong':interp.tone==='risk'?'risk':interp.tone==='caution'?'caution':'steady';
   const reportTitle=reviewedCount<rows.length?`Reviewed stations: ${overallScore}/10`:interp.band||'Your mock report';
   const reportText=reviewedCount<rows.length?`${reviewedCount}/${rows.length} stations currently have AI feedback.`:interp.text||'Review your score pattern, station feedback, recordings, and transcripts.';
   const manual=String(attempt.manual_review_notes||'').trim();
   const oneThing=report.oneThing||{};
   const actions=Array.isArray(report.actionPlan)&&report.actionPlan.length?report.actionPlan:[{label:'Next practice move',title:'Repeat the weakest station type under timing',detail:'Use the station breakdown below to choose what to practise next.'}];
   const readiness=Array.isArray(report.readiness)&&report.readiness.length?report.readiness:[{label:'Overall repeatability',status:'watch',detail:'Open the station detail below and check whether the same weakness repeats.'}];
   content.removeAttribute('style');
   content.innerHTML=`
    <section class="k2mr-hero">
     <div class="k2mr-hero-top">
      <div>
       <div class="k2mr-kicker">Full CASPer mock report &middot; ${esc(fmtDate(attempt.completed_at)||'Saved')}</div>
       <h1>${esc(reportTitle)}</h1>
       <p class="k2mr-hero-sub">${esc(reportText)}</p>
      </div>
      <div class="k2mr-score-block">
       <div class="k2mr-score-big">${esc(String(overallScore))}<span class="max">/10</span></div>
       <div class="k2mr-score-lbl">${reviewedCount<rows.length?'Reviewed avg':'Cohort signal'}</div>
       ${interp.band?`<div class="k2mr-score-band ${bandClass}">${esc(interp.band)}</div>`:''}
      </div>
     </div>
     <div class="k2mr-stats">
      <div class="k2mr-stat"><div class="k2mr-stat-num">${rows.length}</div><div class="k2mr-stat-lbl">Stations</div></div>
      <div class="k2mr-stat"><div class="k2mr-stat-num">${esc(String(avgScore(videoRows)))}</div><div class="k2mr-stat-lbl">Video avg</div></div>
      <div class="k2mr-stat"><div class="k2mr-stat-num">${esc(String(avgScore(typedRows)))}</div><div class="k2mr-stat-lbl">Typed avg</div></div>
      <div class="k2mr-stat"><div class="k2mr-stat-num">${esc(attempt.tier||'mock')}</div><div class="k2mr-stat-lbl">Tier</div></div>
      <div class="k2mr-stat"><div class="k2mr-stat-num">${esc(fmtDate(attempt.completed_at)||'–')}</div><div class="k2mr-stat-lbl">Completed</div></div>
     </div>
     <div class="k2mr-hero-foot"><strong>Guide only:</strong> 6.5+ is likely a Q4-style signal if repeatable; 5.5–6.5 is probably Q3. Scores run cooler than free tools.</div>
    </section>
    ${oneThing.title?`<section class="k2mr-onething"><div class="k2mr-kicker">The one thing to fix</div><h2>${esc(oneThing.title)}</h2><p>${esc(oneThing.body||'')}</p>${oneThing.source?`<div class="k2mr-onething-why"><strong>WHY THIS ONE:</strong> ${esc(oneThing.source)}</div>`:''}</section>`:''}
    ${manual?`<div class="k2mr-actionbar" style="background:linear-gradient(135deg,rgba(34,197,94,0.08),rgba(34,197,94,0.02));border-color:rgba(34,197,94,0.25);"><div class="k2mr-actionbar-text"><strong style="color:var(--green);">Dan's manual review result.</strong> ${esc(manual)}</div></div>`:''}
    <section class="k2mr-section">
     <div class="k2mr-section-head"><div class="k2mr-kicker">Readiness dashboard</div><h3>Where you stand <em>right now</em>.</h3></div>
     <div class="k2mr-card"><div class="k2mr-readiness">${readiness.map(item=>`<div class="k2mr-ready-item"><div class="k2mr-ready-head"><div class="k2mr-ready-label">${esc(item.label||'Readiness')}</div><div class="k2mr-status ${statusClass(item.status)}">${statusLabel(item.status)}</div></div><div class="k2mr-ready-detail">${esc(item.detail||'')}</div></div>`).join('')}</div></div>
    </section>
    <section class="k2mr-section">
     <div class="k2mr-section-head"><div class="k2mr-kicker">Next practice block</div><h3>What to do <em>this week</em>.</h3></div>
     <div class="k2mr-card"><div class="k2mr-actionplan">${actions.map((a,i)=>`<div class="k2mr-action"><div class="k2mr-action-num">${i+1}</div><div><div class="k2mr-action-kicker">${esc(a.label||'')}</div><div class="k2mr-action-title">${esc(a.title||'')}</div><div class="k2mr-action-detail">${esc(a.detail||'')}</div></div></div>`).join('')}</div></div>
    </section>
    <div class="k2mr-notice" style="margin-bottom:22px;">Video recordings expire 30 days after the mock. Transcripts and feedback remain available.</div>
    ${rows.map(stationHTML).join('')}
   `;
  }
  function stationHTML(row,index){
   const isVideo=row.type==='video',title=`${isVideo?'Video':'Typed'} ${row.localIndex||index+1}`;
   const fb=getFb(row),n=numScore(row),col=scoreColor(n);
   return`<section class="k2mr-explorer" style="margin-bottom:14px;"><div class="k2mr-explorer-head"><div class="k2mr-explorer-title-block"><div class="k2mr-kicker">${esc(title)}</div><h3 style="font-size:1.1rem;margin-top:4px;">${esc(row.station?.category||'CASPer')}</h3><p style="font-family:var(--mono);font-size:0.7rem;letter-spacing:0.04em;">${esc(row.tier||(isVideo?attempt.tier:'typed'))}</p></div><div style="text-align:right;flex-shrink:0;"><div style="font-family:'DM Serif Display',serif;font-size:2.2rem;line-height:1;color:${col};">${esc(rowScore(row))}</div></div></div><div class="k2mr-explorer-body"><div class="k2mr-station-grid"><div class="k2mr-station-left">${isVideo?videoHTML(row,index):`<div class="k2mr-answer-card"><div class="k2mr-card-title" style="margin-bottom:8px;">Your typed answer</div><div class="k2mr-answer-text">${esc(row.answer||'No typed response captured.')}</div></div>`}</div><div class="k2mr-station-right"><div class="k2mr-scenario-card"><div class="k2mr-card-title">Scenario</div><div class="k2mr-scenario-text">${esc(row.station?.scenario||'')}</div>${promptsBlock(row)}</div><div class="k2mr-fbsummary" style="margin-top:0;">${fbTile('strength','&#10003; Strength',fb.strength)}${fbTile('improve','&rarr; Biggest improvement',fb.improve)}${fbTile('empathy','&#9825; Empathy layer to add',fb.empathy)}${fb.missed&&fb.missed!=='None'?fbTile('missed','&#8859; Missed point',fb.missed):''}${fb.excellent?fbTile('excellent','&#9733; An excellent response would add',fb.excellent):''}</div>${criteriaHTML(row)}</div></div></div></section>`;
  }
  function promptsBlock(row){const ps=[row.station?.prompt1,row.station?.prompt2].filter(Boolean);if(!ps.length)return'';return`<div class="k2mr-prompts" style="margin-top:14px;">${ps.map((p,i)=>`<div class="k2mr-prompt"><div class="k2mr-prompt-num">Prompt ${i+1}</div><div class="k2mr-prompt-text">${esc(p)}</div></div>`).join('')}</div>`;}
  function videoHTML(row,index){const id=`rv-${(attempt.id||'x').replace(/[^a-zA-Z0-9_-]/g,'')}-${index}`;const canLoad=row.recording_key&&!attempt.expired;const segs=Array.isArray(row.transcript_segments)?row.transcript_segments:[];const issue=row.processing_error?`<div class="k2mr-notice" style="background:rgba(239,68,68,0.08);border-color:rgba(239,68,68,0.25);margin-top:10px;font-size:0.76rem;"><strong style="color:var(--red);">Issue:</strong> ${esc(row.processing_error)}</div>`:'';return`<div style="background:#000;border:1px solid rgba(255,255,255,0.1);border-radius:12px;overflow:hidden;"><video id="${attr(id)}" controls playsinline preload="metadata" data-attempt-id="${attr(attempt.id)}" data-recording-key="${attr(row.recording_key||'')}" style="width:100%;aspect-ratio:16/9;background:#000;display:none;"></video>${canLoad?`<button type="button" onclick="loadRec(event,'${attr(id)}')" style="width:100%;min-height:180px;border:0;background:linear-gradient(135deg,#0a1628,#0d2a52);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;font-family:inherit;cursor:pointer;padding:24px;"><strong style="font-family:'DM Serif Display',serif;font-size:1.2rem;">Load recording</strong><span style="font-family:var(--mono);font-size:0.72rem;color:rgba(255,255,255,0.6);letter-spacing:0.04em;">Authenticated playback &middot; Expires ${esc(fmtDate(attempt.expires_at))}</span></button>`:`<div style="width:100%;min-height:160px;background:linear-gradient(135deg,#0a1628,#0d2a52);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:24px;text-align:center;"><strong style="font-family:'DM Serif Display',serif;font-size:1.1rem;">${attempt.expired?'Recording expired':'No recording saved'}</strong><span style="font-family:var(--mono);font-size:0.72rem;color:rgba(255,255,255,0.55);">${attempt.expired?'The 30-day playback window has passed.':'Transcript and feedback are still shown below.'}</span></div>`}</div>${canLoad?`<div style="margin-top:10px;"><button type="button" onclick="dlRec(event,'${attr(id)}')" class="k2mr-btn k2mr-btn-ghost" style="font-family:var(--mono);font-size:0.72rem;padding:8px 14px;width:auto;">Download recording</button></div>`:''}${row.duration_sec?`<div style="font-family:var(--mono);font-size:0.68rem;color:rgba(255,255,255,0.4);margin-top:7px;letter-spacing:0.04em;">Duration ${esc(fmtDur(row.duration_sec))}</div>`:''}${issue}${segs.length?`<div class="k2mr-card" style="margin-top:12px;padding:14px 16px;"><div class="k2mr-card-title" style="margin-bottom:8px;">Synced transcript</div><div data-sync-for="${attr(id)}" style="max-height:260px;overflow:auto;display:grid;gap:3px;">${segs.map(seg=>`<button type="button" data-start="${attr(seg.start||0)}" data-end="${attr(seg.end||seg.start||0)}" onclick="jumpTr('${attr(id)}',${Number(seg.start||0)})" style="width:100%;text-align:left;border:0;background:transparent;border-radius:7px;padding:7px 9px;font-family:inherit;font-size:0.78rem;line-height:1.55;color:rgba(255,255,255,0.7);cursor:pointer;">${esc(seg.text||'')}</button>`).join('')}</div></div>`:(row.transcript?`<div class="k2mr-card" style="margin-top:12px;padding:14px 16px;"><div class="k2mr-card-title" style="margin-bottom:7px;">Transcript used for marking</div><div style="font-size:0.8rem;color:rgba(255,255,255,0.7);line-height:1.7;max-height:230px;overflow:auto;">${esc(row.transcript)}</div></div>`:'')}`;
  }
  function criteriaHTML(row){const fb=row.feedback||{};if(row.type==='video'){const items=[];(fb.per_prompt||[]).forEach((prompt,i)=>{Object.entries(prompt.scores||{}).forEach(([key,val])=>{const s=safeN(val?.score);items.push(`<div class="k2mr-comp"><div class="k2mr-comp-head"><div class="k2mr-comp-name">Prompt ${i+1} &middot; ${esc(key.replace(/_/g,' '))}</div><div class="k2mr-comp-score" style="color:${scoreColor(s)};">${Number.isFinite(s)?`${s}/10`:'–'}</div></div><div class="k2mr-comp-note">${esc(val?.comment||val?.label||'')}</div></div>`);});});return items.length?`<div class="k2mr-comps">${items.join('')}</div>`:'';}const raw=fb.competencies;const items=Array.isArray(raw)?raw:(raw?Object.entries(raw).map(([k,v])=>typeof v==='object'?{name:k,...v}:{name:k,score:v}):[]);return items.length?`<div class="k2mr-comps"><div class="k2mr-card-title" style="margin-bottom:10px;">Competency breakdown</div>${items.map(item=>{const s=safeN(item.score);return`<div class="k2mr-comp"><div class="k2mr-comp-head"><div class="k2mr-comp-name">${esc(item.name||item.competency||'Competency')}</div><div class="k2mr-comp-score" style="color:${scoreColor(s)};">${Number.isFinite(s)?`${s}/10`:'–'}</div></div><div class="k2mr-comp-note">${esc(item.improve||item.improvement||item.evidence||item.note||'')}</div></div>`;}).join('')}</div>`:'';}
  function recUrl(vid){if(!vid?.dataset?.attemptId||!vid?.dataset?.recordingKey)throw new Error('Recording details missing.');return`${API_BASE}/api/casper-mock/recording?attempt_id=${encodeURIComponent(vid.dataset.attemptId)}&key=${encodeURIComponent(vid.dataset.recordingKey)}`;}
  async function fetchBlob(vid){const tok=localStorage.getItem(TOKEN_KEY);if(!tok)throw new Error('Please log in again.');const res=await fetch(recUrl(vid),{headers:{Authorization:`Bearer ${tok}`}});if(!res.ok){const d=await res.json().catch(()=>({}));throw new Error(d.message||d.error||'Recording unavailable.');}const b=await res.blob();if(b.type&&!b.type.startsWith('video/')&&b.type!=='application/octet-stream')throw new Error('Download blocked: file is not a video.');return b;}
  async function loadRec(event,videoId){event?.stopPropagation?.();const vid=document.getElementById(videoId),btn=event?.currentTarget;if(!vid)return;if(vid.dataset.loaded==='1'){vid.style.display='block';vid.play().catch(()=>{});return;}if(btn){btn.disabled=true;btn.querySelector('span').textContent='Loading secure playback\u2026';}try{const b=await fetchBlob(vid),url=URL.createObjectURL(b);vid.dataset.loaded='1';vid.src=url;vid.style.display='block';bindSync(vid);if(btn)btn.style.display='none';vid.play().catch(()=>{});}catch(err){if(btn){btn.disabled=false;btn.innerHTML=`<strong>Could not load recording</strong><span style="font-family:var(--mono);font-size:0.72rem;color:rgba(255,255,255,0.6);">${esc(err.message||'Try again.')}</span>`;}}}
  function savB(b,name){const url=URL.createObjectURL(b),a=document.createElement('a');a.href=url;a.download=name;a.rel='noopener';document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),30000);}
  async function dlRec(event,videoId){event?.stopPropagation?.();const btn=event?.currentTarget,vid=document.getElementById(videoId);if(!vid)return;const orig=btn?.textContent||'Download';try{if(btn){btn.disabled=true;btn.textContent='Preparing\u2026';}const b=await fetchBlob(vid);const ext=String(b.type||'').includes('mp4')?'mp4':'webm';savB(b,`key2md-casper-mock-${String(videoId).slice(0,60)}.${ext}`);if(btn)btn.textContent='Downloaded';setTimeout(()=>{if(btn){btn.disabled=false;btn.textContent=orig;}},1800);}catch(err){if(btn){btn.disabled=false;btn.textContent='Failed';btn.title=err.message;setTimeout(()=>{btn.textContent=orig;},2600);}}}
  function bindSync(vid){if(vid.dataset.syncBound==='1')return;vid.dataset.syncBound='1';vid.addEventListener('timeupdate',()=>syncTr(vid.id,vid.currentTime||0));vid.addEventListener('seeked',()=>syncTr(vid.id,vid.currentTime||0));}
  function syncTr(videoId,time){const wrap=document.querySelector(`[data-sync-for="${CSS.escape(videoId)}"]`);if(!wrap)return;let active=null;wrap.querySelectorAll('[data-start]').forEach(btn=>{const s=Number(btn.dataset.start||0),e=Number(btn.dataset.end||s+2),on=time>=s&&time<Math.max(e,s+0.8);btn.style.background=on?'rgba(14,165,233,0.15)':'transparent';btn.style.boxShadow=on?'inset 3px 0 0 var(--teal2)':'none';btn.style.color=on?'#fff':'rgba(255,255,255,0.7)';if(on)active=btn;});if(active&&wrap.dataset.lastActive!==String(active.dataset.start)){wrap.dataset.lastActive=String(active.dataset.start);active.scrollIntoView({block:'nearest'});}}
  function jumpTr(videoId,start){const vid=document.getElementById(videoId);if(!vid)return;vid.currentTime=Math.max(0,Number(start)||0);syncTr(videoId,vid.currentTime);if(vid.dataset.loaded==='1')vid.play().catch(()=>{});}
 </script>
</body>
</html>
